<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>LAGA PRO | ADMIN POWER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-950 text-white p-10">
    <div class="max-w-5xl mx-auto">
        <h1 class="text-4xl font-black text-yellow-500 mb-10 italic">ADMIN MASTER</h1>

        <div class="bg-slate-900 rounded-3xl p-8 border border-white/5 mb-10">
            <h2 class="text-xl font-bold mb-6">DAFTAR USER & TOPUP SALDO</h2>
            <div id="adminUserList" class="grid grid-cols-2 gap-6">
                </div>
        </div>

        <div class="grid grid-cols-2 gap-10">
             <button onclick="setWinner('A')" class="bg-blue-600 p-10 rounded-3xl font-black text-2xl">WIN BLUE (A)</button>
             <button onclick="setWinner('B')" class="bg-red-600 p-10 rounded-3xl font-black text-2xl">WIN RED (B)</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { ... }; // Samakan config
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // List User & Fitur Tambah Saldo
        onValue(ref(db, 'users'), (snapshot) => {
            const users = snapshot.val();
            const container = document.getElementById('adminUserList');
            container.innerHTML = "";
            for(let id in users) {
                container.innerHTML += `
                    <div class="bg-black/50 p-6 rounded-2xl flex justify-between items-center border border-white/5">
                        <div>
                            <p class="font-bold text-yellow-500">${id.toUpperCase()}</p>
                            <p class="text-xs text-slate-400 font-mono">Saldo: Rp ${users[id].balance.toLocaleString()}</p>
                        </div>
                        <button onclick="topup('${id}')" class="bg-green-600 px-4 py-2 rounded-xl text-xs font-bold hover:bg-green-500 transition">TOPUP</button>
                    </div>
                `;
            }
        });

        window.topup = (uid) => {
            Swal.fire({
                title: 'Top Up User: ' + uid,
                input: 'number',
                inputLabel: 'Masukkan Nominal (Contoh: 50000)',
                showCancelButton: true,
                background: '#0f172a', color: '#fff'
            }).then((res) => {
                if(res.isConfirmed) {
                    const amount = parseInt(res.value);
                    const userRef = ref(db, 'users/' + uid);
                    onValue(userRef, (snap) => {
                        const current = snap.val().balance || 0;
                        update(userRef, { balance: current + amount });
                        Swal.fire('Sukses!', 'Saldo berhasil ditambah.', 'success');
                    }, { onlyOnce: true });
                }
            });
        };

        window.setWinner = (w) => {
            set(ref(db, 'match/result'), null).then(() => {
                set(ref(db, 'match/result'), w);
            });
        };
    </script>
</body>
</html>
