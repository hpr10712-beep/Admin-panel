<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { /* SAMA DENGAN DI ATAS */ };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    onValue(ref(db, 'users'), (snap) => {
        const users = snap.val();
        const container = document.getElementById('userList');
        container.innerHTML = "";
        
        for (let id in users) {
            container.innerHTML += `
                <div class="bg-slate-900 p-5 rounded-2xl flex justify-between items-center border border-white/5">
                    <div>
                        <p class="font-bold text-blue-400 text-sm">${id}</p>
                        <p class="text-yellow-500 font-bold font-orbitron">Rp ${users[id].balance.toLocaleString()}</p>
                    </div>
                    <button onclick="prosesTopUp('${id}', ${users[id].balance})" class="bg-yellow-600 text-black px-5 py-2 rounded-xl font-bold hover:bg-yellow-400 transition">TOP UP</button>
                </div>
            `;
        }
    });

    window.prosesTopUp = (id, current) => {
        Swal.fire({
            title: 'Top Up: ' + id,
            input: 'number',
            inputPlaceholder: 'Nominal Saldo...',
            showCancelButton: true,
            confirmButtonText: 'Tambah'
        }).then((res) => {
            if (res.isConfirmed && res.value) {
                update(ref(db, 'users/' + id), { balance: current + parseInt(res.value) });
                Swal.fire('Sukses', 'Saldo ID ' + id + ' berhasil ditambah!', 'success');
            }
        });
    };
</script>
