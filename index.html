<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBro - Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #0b1120;
            --sidebar: #0f172a;
            --panel: #1e293b;
            --panel-hover: #334155;
            --accent: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.2);
            --danger: #ef4444;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR */
        aside { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .logo { padding: 25px 20px; font-size: 1.5rem; font-weight: 700; color: var(--text); letter-spacing: -0.5px; border-bottom: 1px solid var(--border); }
        .logo span { color: var(--accent); }
        .nav-menu { padding: 20px 10px; display: flex; flex-direction: column; gap: 5px; flex: 1; }
        .nav-item { padding: 12px 15px; border-radius: 8px; display: flex; align-items: center; gap: 15px; color: var(--text-dim); text-decoration: none; transition: 0.2s; cursor: pointer; }
        .nav-item:hover, .nav-item.active { background: var(--panel-hover); color: var(--accent); }

        /* MAIN CONTENT */
        main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 30px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        h1 { font-size: 1.8rem; font-weight: 600; }
        .admin-badge { background: var(--panel); padding: 8px 15px; border-radius: 20px; font-size: 0.85rem; border: 1px solid var(--border); color: var(--accent); font-weight: 600; }

        /* STATS GRID */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 20px; display: flex; align-items: center; gap: 20px; transition: 0.3s; }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); border-color: var(--accent); }
        .stat-icon { width: 60px; height: 60px; border-radius: 12px; background: var(--accent-glow); color: var(--accent); display: flex; justify-content: center; align-items: center; font-size: 1.8rem; }
        .stat-info h3 { font-size: 2rem; margin-bottom: 5px; }
        .stat-info p { color: var(--text-dim); font-size: 0.9rem; font-weight: 500; }

        /* DATA TABLE */
        .table-container { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
        .table-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .table-header h2 { font-size: 1.2rem; }
        
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 15px 20px; font-size: 0.85rem; color: var(--text-dim); text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 15px 20px; font-size: 0.95rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(255, 255, 255, 0.02); }

        .user-cell { display: flex; align-items: center; gap: 15px; }
        .user-pfp { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: var(--sidebar); border: 1px solid var(--border); }
        .user-id { font-size: 0.8rem; background: var(--sidebar); padding: 4px 8px; border-radius: 6px; color: var(--accent); margin-top: 4px; display: inline-block; border: 1px solid var(--border); }
        
        .btn-action { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 0.85rem; }
        .btn-action.danger:hover { background: var(--danger); border-color: var(--danger); color: white; }

        @media(max-width: 768px) {
            body { flex-direction: column; }
            aside { width: 100%; height: auto; flex-direction: row; align-items: center; border-right: none; border-bottom: 1px solid var(--border); }
            .nav-menu { flex-direction: row; padding: 10px; flex: unset; }
            .nav-item span { display: none; }
            .table-container { overflow-x: auto; }
        }
    </style>
</head>
<body>

    <aside>
        <div class="logo">My<span>Bro</span> Admin</div>
        <div class="nav-menu">
            <div class="nav-item active"><i class="fas fa-chart-pie"></i> <span>Dashboard</span></div>
            <div class="nav-item" onclick="alert('Fitur pengaturan belum tersedia')"><i class="fas fa-cog"></i> <span>Pengaturan Sistem</span></div>
        </div>
    </aside>

    <main>
        <header>
            <h1>Overview</h1>
            <div class="admin-badge"><i class="fas fa-shield-alt"></i> Super Admin</div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-users"></i></div>
                <div class="stat-info">
                    <h3 id="statUsers">0</h3>
                    <p>Total Pengguna</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-comments"></i></div>
                <div class="stat-info">
                    <h3 id="statChats">0</h3>
                    <p>Total Ruang Obrolan</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-circle-notch"></i></div>
                <div class="stat-info">
                    <h3 id="statStories">0</h3>
                    <p>Pengguna Buat Status</p>
                </div>
            </div>
        </div>

        <div class="table-container">
            <div class="table-header">
                <h2>Daftar Pengguna</h2>
            </div>
            <table id="usersTable">
                <thead>
                    <tr>
                        <th>Profil</th>
                        <th>Bio</th>
                        <th>ID Kontak</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <tr>
                        <td colspan="4" style="text-align:center; padding:30px; color:var(--text-dim);">Memuat data pengguna...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Gunakan kredensial yang sama dengan aplikasi utama
        const firebaseConfig = {
            apiKey: "AIzaSyCHr0eemIkfHNFDUkSaFDklp_c1OgmSnl8",
            authDomain: "mybro-9ba5f.firebaseapp.com",
            databaseURL: "https://mybro-9ba5f-default-rtdb.firebaseio.com/",
            projectId: "mybro-9ba5f"
        };
        const app_fire = initializeApp(firebaseConfig);
        const db = getDatabase(app_fire);

        // --- FETCH DATA STATISTIK & PENGGUNA ---
        const tbody = document.getElementById('usersTableBody');
        
        // 1. Data Pengguna
        onValue(ref(db, 'users'), (snapshot) => {
            if (!snapshot.exists()) {
                document.getElementById('statUsers').innerText = "0";
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;">Belum ada pengguna terdaftar.</td></tr>`;
                return;
            }

            const users = snapshot.val();
            const userKeys = Object.keys(users);
            document.getElementById('statUsers').innerText = userKeys.length;
            
            tbody.innerHTML = ""; // Bersihkan tabel
            
            userKeys.forEach(uid => {
                const profile = users[uid].profile || { name: 'User '+uid, bio: '-', pfp: '' };
                const pfp = profile.pfp || `https://ui-avatars.com/api/?name=${profile.name}&background=1e293b&color=fff`;
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>
                        <div class="user-cell">
                            <img src="${pfp}" class="user-pfp" alt="PFP">
                            <div>
                                <div style="font-weight:600; font-size:1rem;">${profile.name}</div>
                                <div class="user-id">${uid}</div>
                            </div>
                        </div>
                    </td>
                    <td style="color:var(--text-dim); max-width:200px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
                        ${profile.bio || '-'}
                    </td>
                    <td>
                        ${users[uid].contacts ? Object.keys(users[uid].contacts).length + ' Teman' : '0 Teman'}
                    </td>
                    <td>
                        <button class="btn-action danger" onclick="window.deleteUser('${uid}', '${profile.name}')">
                            <i class="fas fa-trash"></i> Hapus
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        });

        // 2. Data Ruang Obrolan
        onValue(ref(db, 'chats'), (snapshot) => {
            const count = snapshot.exists() ? Object.keys(snapshot.val()).length : 0;
            document.getElementById('statChats').innerText = count;
        });

        // 3. Data Status/Stories
        onValue(ref(db, 'stories'), (snapshot) => {
            const count = snapshot.exists() ? Object.keys(snapshot.val()).length : 0;
            document.getElementById('statStories').innerText = count;
        });

        // --- FUNGSI AKSI ADMIN ---
        window.deleteUser = (uid, name) => {
            if(confirm(`PERINGATAN: Apakah Anda yakin ingin menghapus pengguna "${name}" (${uid})?\n\nIni akan menghapus profil dan daftar kontaknya (Riwayat chat dan story mungkin harus dihapus manual).`)) {
                // Hapus data pengguna
                set(ref(db, `users/${uid}`), null).then(() => {
                    alert(`Pengguna ${name} berhasil dihapus.`);
                }).catch(err => {
                    alert("Gagal menghapus pengguna: " + err.message);
                });
            }
        };
    </script>
</body>
</html>
