<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200">
    <title>ELITE ADMIN | OMNI CONTROL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #eab308; --bg-dark: #020617; }
        body { 
            background: var(--bg-dark); color: white; width: 1200px; margin: 0 auto; padding: 40px; font-family: 'Inter', sans-serif; overflow-x: hidden;
            background-image: radial-gradient(circle at 0% 0%, rgba(30, 58, 138, 0.2) 0%, transparent 35%), radial-gradient(circle at 100% 100%, rgba(127, 29, 29, 0.15) 0%, transparent 35%), url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            background-attachment: fixed;
        }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
        .switch { position: relative; display: inline-block; width: 60px; height: 30px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #1e293b; transition: .4s; border-radius: 34px; border: 1px solid rgba(255,255,255,0.1); }
        .slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 4px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #10b981; }
        input:checked + .slider:before { transform: translateX(30px); }
        .activity-card { background: linear-gradient(90deg, rgba(30, 41, 59, 0.4), rgba(15, 23, 42, 0.8)); border-left: 4px solid #3b82f6; padding: 15px 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; transition: 0.3s; }
        .win-border { border-left-color: #10b981; }
        .lose-border { border-left-color: #ef4444; }
        .badge-status { font-size: 10px; font-weight: 900; padding: 4px 10px; border-radius: 6px; text-transform: uppercase; }
        .market-box { background: rgba(15, 23, 42, 0.5); border: 1px dashed rgba(59, 130, 246, 0.3); }
        .chart-wrapper { display: flex; gap: 15px; align-items: flex-end; height: 120px; padding: 10px 20px; }
        .bar-item { flex: 1; transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); border-radius: 6px 6px 2px 2px; position: relative; min-height: 5px; }
        .bar-value { position: absolute; top: -25px; width: 100%; text-align: center; font-size: 10px; font-family: 'Orbitron'; font-weight: 900; }
    </style>
</head>
<body>

    <nav class="flex justify-between items-center mb-10 glass p-8 rounded-[3rem] border-b-2 border-yellow-500/30">
        <div class="flex items-center gap-5">
            <div class="h-14 w-14 bg-gradient-to-br from-yellow-400 to-yellow-600 rounded-2xl flex items-center justify-center shadow-[0_0_20px_rgba(234,179,8,0.4)]">
                <span class="font-black text-black text-2xl font-orbitron">E</span>
            </div>
            <div>
                <h1 class="font-orbitron text-3xl font-black text-white tracking-tighter italic">OMNI CONTROL</h1>
                <p class="text-[10px] text-yellow-500 font-bold tracking-[0.3em] uppercase opacity-70">Elite Arena System v2.0</p>
            </div>
        </div>
        <div class="glass px-10 py-4 rounded-3xl text-right border-r-4 border-yellow-500 bg-slate-950/50">
            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mb-1">Global Vault Balance</p>
            <p id="globalBal" class="text-2xl font-orbitron font-black text-yellow-500">Rp 0</p>
        </div>
    </nav>

    <div class="grid grid-cols-12 gap-8 items-start">
        <div class="col-span-9 space-y-8">
            
            <div class="glass p-8 rounded-[2.5rem] border-t-4 border-green-500">
                <h3 class="font-orbitron font-bold text-xs mb-5 text-green-400 uppercase tracking-widest">Quick Top Up</h3>
                <div class="flex gap-4">
                    <input type="text" id="manualId" class="flex-1 bg-slate-950/80 border border-slate-700 p-5 rounded-2xl font-orbitron text-yellow-500 outline-none" placeholder="PASTE PLAYER ID">
                    <input type="number" id="manualAmount" class="w-56 bg-slate-950/80 border border-slate-700 p-5 rounded-2xl text-white outline-none" placeholder="NOMINAL">
                    <button id="btnTopUp" class="bg-green-600 hover:bg-green-500 px-10 rounded-2xl font-orbitron font-black text-white shadow-lg shadow-green-900/20 active:scale-95 transition-all">SEND</button>
                </div>
            </div>

            <div class="glass p-8 rounded-[2.5rem] border-l-4 border-blue-500 market-box">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h3 class="font-orbitron font-bold text-xs text-blue-400 uppercase tracking-[0.2em]">Market Volume Analysis</h3>
                        <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Real-time betting weight</p>
                    </div>
                    <button onclick="copyMarketReport()" class="bg-blue-600/20 hover:bg-blue-600 text-blue-400 hover:text-white p-3 rounded-2xl transition-all border border-blue-500/30">
                        <svg xmlns="http://www.w3.org/2001/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 100-2.684 3 3 0 000 2.684zm0 12.684a3 3 0 100-2.684 3 3 0 000 2.684z" /></svg>
                    </button>
                </div>
                <div class="chart-wrapper">
                    <div class="bar-item bg-gradient-to-t from-blue-700 to-blue-400 shadow-[0_0_15px_rgba(37,99,235,0.4)]" id="barA" style="height: 10%">
                        <div class="bar-value text-blue-400" id="valA">Rp 0</div>
                    </div>
                    <div class="bar-item bg-gradient-to-t from-red-700 to-red-400 shadow-[0_0_15px_rgba(220,38,38,0.4)]" id="barB" style="height: 10%">
                        <div class="bar-value text-red-400" id="valB">Rp 0</div>
                    </div>
                </div>
                <div class="flex justify-between mt-4 font-orbitron text-[11px] font-black tracking-widest">
                    <div class="flex items-center gap-2 text-blue-500"><span class="h-2 w-2 bg-blue-500 rounded-full animate-pulse"></span> UNIT A</div>
                    <div class="flex items-center gap-2 text-red-500">UNIT B <span class="h-2 w-2 bg-red-500 rounded-full animate-pulse"></span></div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-8">
                <button id="btnWinA" class="group bg-blue-600 p-12 rounded-[2.5rem] font-orbitron font-black text-3xl shadow-2xl active:scale-95 transition-all">SET WIN A</button>
                <button id="btnWinB" class="group bg-red-600 p-12 rounded-[2.5rem] font-orbitron font-black text-3xl shadow-2xl active:scale-95 transition-all">SET WIN B</button>
            </div>

            <div class="grid grid-cols-2 gap-6">
                <div class="glass p-6 rounded-[2.5rem] border-r-4 border-blue-500 flex justify-between items-center">
                    <div>
                        <h3 class="font-orbitron font-bold text-sm text-white uppercase">GATEWAY: <span id="statusLabel" class="text-green-500">OPEN</span></h3>
                        <p class="text-[9px] text-slate-500 font-medium">Kunci bursa taruhan.</p>
                    </div>
                    <label class="switch scale-90"><input type="checkbox" id="gateToggle" checked><span class="slider"></span></label>
                </div>
                <div class="glass p-6 rounded-[2.5rem] border-r-4 border-red-600 flex justify-between items-center">
                    <div><h3 class="font-orbitron font-bold text-sm text-white uppercase">RESET MATCH</h3><p class="text-[9px] text-slate-500 font-medium">Hapus status WIN/LOSE.</p></div>
                    <button id="btnResetMatch" class="bg-red-600/10 hover:bg-red-600 text-red-500 hover:text-white p-3 rounded-2xl transition-all">
                        <svg xmlns="http://www.w3.org/2001/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                    </button>
                </div>
            </div>

            <div class="glass p-10 rounded-[3.5rem] border-b-8 border-blue-600/50 mb-10">
                <div class="flex justify-between items-end mb-8">
                    <div><h3 class="font-orbitron font-black text-blue-400 text-lg uppercase">Real-Time Activity Monitor</h3></div>
                    <button id="btnResetLogs" class="bg-red-600/20 hover:bg-red-600 text-red-500 hover:text-white px-4 py-1.5 rounded-xl font-orbitron text-[9px] font-bold">RESET ALL TRX</button>
                </div>
                <div id="liveActivity" class="grid grid-cols-2 gap-4 h-[600px] overflow-y-auto pr-4"></div>
            </div>
        </div>

        <div class="col-span-3 glass p-6 rounded-[3rem] border-t-4 border-yellow-500 sticky top-10 self-stretch mb-10">
            <h3 class="font-orbitron font-bold text-yellow-500 mb-6 text-[10px] uppercase text-center italic">Live Users Online</h3>
            <div id="uList" class="space-y-3 overflow-y-auto pr-2 h-[1150px]"></div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, set, update, push, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCHr0eemIkfHNFDUkSaFDklp_c1OgmSnl8", 
        databaseURL: "https://mybro-9ba5f-default-rtdb.firebaseio.com",
        projectId: "mybro-9ba5f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const getFullTime = () => {
        const d = new Date();
        const days = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
        return `${days[d.getDay()]}, ${d.getDate().toString().padStart(2, '0')}/${(d.getMonth() + 1).toString().padStart(2, '0')}/${d.getFullYear()} - ${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}:${d.getSeconds().toString().padStart(2, '0')}`;
    };

    // Global Report Variable
    window.currentMarket = { a: 0, b: 0 };

    // --- LIST PLAYER & MARKET LOGIC ---
    onValue(ref(db, 'users'), snap => {
        const users = snap.val() || {};
        const container = document.getElementById('uList');
        let totalVault = 0;
        let totalBetA = 0;
        let totalBetB = 0;

        container.innerHTML = "";
        for(let id in users){
            const u = users[id];
            const b = u.balance || 0;
            totalVault += b;

            if(u.side === 'A') totalBetA += (u.betAmount || 0);
            if(u.side === 'B') totalBetB += (u.betAmount || 0);

            const div = document.createElement('div');
            div.className = "bg-slate-900/60 p-4 rounded-2xl border border-white/5 flex justify-between items-center hover:border-yellow-500/30 transition-all";
            div.innerHTML = `<div><p class="text-[10px] font-black text-blue-400 uppercase tracking-tighter">${id}</p><p class="text-sm font-black text-yellow-500 font-orbitron">Rp ${b.toLocaleString()}</p></div><button class="bg-slate-800 hover:bg-yellow-600 text-[8px] font-bold px-3 py-1.5 rounded-lg">PILIH</button>`;
            div.querySelector('button').onclick = () => { document.getElementById('manualId').value = id; };
            container.appendChild(div);
        }
        
        document.getElementById('globalBal').innerText = "Rp " + totalVault.toLocaleString();
        
        // Update Chart
        const maxVal = Math.max(totalBetA, totalBetB, 500000);
        document.getElementById('barA').style.height = (totalBetA / maxVal * 100) + "%";
        document.getElementById('barB').style.height = (totalBetB / maxVal * 100) + "%";
        document.getElementById('valA').innerText = "Rp " + totalBetA.toLocaleString();
        document.getElementById('valB').innerText = "Rp " + totalBetB.toLocaleString();
        
        window.currentMarket = { a: totalBetA, b: totalBetB };
    });

    // --- SHARE REPORT ---
    window.copyMarketReport = () => {
        const report = `📊 OMNI CONTROL REPORT\n🔵 UNIT A: Rp ${window.currentMarket.a.toLocaleString()}\n🔴 UNIT B: Rp ${window.currentMarket.b.toLocaleString()}\n💰 VAULT : ${document.getElementById('globalBal').innerText}\n⏰ ${new Date().toLocaleTimeString()}`;
        navigator.clipboard.writeText(report);
        Swal.fire({ title: 'Report Copied!', icon: 'success', toast: true, position: 'top-end', showConfirmButton: false, timer: 2000, background: '#020617', color: '#fff' });
    };

    // --- TOP UP ---
    document.getElementById('btnTopUp').onclick = async () => {
        const id = document.getElementById('manualId').value.toUpperCase().trim();
        const amt = parseInt(document.getElementById('manualAmount').value);
        if(!id || !amt) return Swal.fire('Data Missing', 'Masukkan ID dan Nominal!', 'warning');
        const userRef = ref(db, 'users/' + id);
        const snap = await get(userRef);
        if(snap.exists()){
            const current = snap.val().balance || 0;
            await update(userRef, { balance: current + amt });
            push(ref(db, 'globalLogs'), { time: getFullTime(), user: id, desc: 'Top Up Success (Admin)', amount: amt, type: 'win' });
            Swal.fire('Success', `Rp ${amt.toLocaleString()} dikirim ke ${id}`, 'success');
            document.getElementById('manualAmount').value = "";
        } else { Swal.fire('Invalid ID', 'Player tidak ditemukan!', 'error'); }
    };

    // --- WINNER ---
    const handleWinner = (side) => {
        Swal.fire({ title: 'Konfirmasi Pemenang', text: `UNIT ${side} menang?`, icon: 'question', showCancelButton: true, confirmButtonColor: side === 'A' ? '#2563eb' : '#dc2626' })
        .then(res => { if(res.isConfirmed){ set(ref(db, 'match/result'), null).then(() => set(ref(db, 'match/result'), side)); } });
    };
    document.getElementById('btnWinA').onclick = () => handleWinner('A');
    document.getElementById('btnWinB').onclick = () => handleWinner('B');

    // --- GATE ---
    const gateToggle = document.getElementById('gateToggle');
    gateToggle.onchange = (e) => set(ref(db, 'match/status'), e.target.checked ? 'open' : 'closed');
    onValue(ref(db, 'match/status'), snap => {
        const status = snap.val() || 'open';
        gateToggle.checked = (status === 'open');
        document.getElementById('statusLabel').innerText = status.toUpperCase();
        document.getElementById('statusLabel').className = status === 'open' ? "text-green-500" : "text-red-500";
    });

    // --- LIVE MONITOR ---
    onValue(ref(db, 'globalLogs'), snap => {
        const logs = snap.val() || {};
        const container = document.getElementById('liveActivity');
        container.innerHTML = "";
        Object.values(logs).reverse().forEach(l => {
            let sClass = l.type === 'win' ? "bg-green-500/20 text-green-500" : "bg-red-500/20 text-red-500";
            let bClass = l.type === 'win' ? "win-border" : "lose-border";
            container.innerHTML += `<div class="activity-card ${bClass}"><div><p class="text-[10px] font-black text-blue-400 uppercase">${l.user} <span class="text-slate-500 ml-3 font-mono text-[9px]">${l.time}</span></p><p class="text-[12px] font-bold text-white">${l.desc}</p></div><div class="text-right"><p class="text-[13px] font-orbitron font-black text-white italic">Rp ${l.amount.toLocaleString()}</p><span class="badge-status ${sClass}">${l.type.toUpperCase()}</span></div></div>`;
        });
    });

    // --- RESET LOGS & MATCH ---
    document.getElementById('btnResetLogs').onclick = () => { set(ref(db, 'globalLogs'), null); };
    document.getElementById('btnResetMatch').onclick = () => { set(ref(db, 'match/result'), null); };

</script>
</body>
</html>
