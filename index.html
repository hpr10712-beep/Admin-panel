<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radz Store Elite</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#000;
  color:#fff;
}

.container{
  max-width:500px;
  margin:auto;
  padding:20px;
}

.card{
  background:#111;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:red;
  color:#fff;
  cursor:pointer;
}

/* SLIDER */
.slider-container{
  aspect-ratio:16/9;
  overflow:hidden;
  border-radius:10px;
}

.slider{
  display:flex;
  transition:0.4s;
}

.slider img{
  width:100%;
  flex-shrink:0;
  object-fit:cover;
}

.dots{
  text-align:center;
  margin-top:5px;
}
.dots span{
  display:inline-block;
  width:8px;
  height:8px;
  background:#555;
  border-radius:50%;
  margin:3px;
}
.dots .active{background:red}

.hidden{display:none;}
</style>
</head>

<body>

<div class="container" id="loginBox">
<h2>Login</h2>
<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>
<button onclick="login()">LOGIN</button>
</div>

<div class="container hidden" id="dashboard">

<div class="card">
<b id="userEmail"></b><br>
Status: <span id="statusUser">FREE</span>
</div>

<div class="card">
<div class="slider-container">
<div class="slider" id="slider">
<img src="https://picsum.photos/400/200?1">
<img src="https://picsum.photos/400/200?2">
<img src="https://picsum.photos/400/200?3">
</div>
</div>
<div class="dots" id="dots"></div>
</div>

<div class="card">
<button onclick="openPaket()">BELI PAKET</button>
<button onclick="openMenu()">MENU</button>
<button onclick="logout()">LOGOUT</button>
</div>

<div id="paketMenu" class="hidden card">
<button onclick="beli('VIP')">VIP</button>
<button onclick="beli('PREMIUM')">PREMIUM</button>
</div>

<div id="bugMenu" class="hidden card">
<button onclick="akses('VIP')">FITUR VIP</button>
<button onclick="akses('PREMIUM')">FITUR PREMIUM</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* CONFIG KAMU */
const firebaseConfig = {
  apiKey: "AIzaSyAgGd8-u_E_JKKs0Zf7rXZ6O4ADw85CUAU",
  authDomain: "radzpanel-3a8a3.firebaseapp.com",
  projectId: "radzpanel-3a8a3",
  storageBucket: "radzpanel-3a8a3.firebasestorage.app",
  messagingSenderId: "20608954308",
  appId: "1:20608954308:web:0e09ba796c9086813fbe91",
  measurementId: "G-VR4YG2S5L1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ================= REGISTER ================= */
window.register = function(){
  const mail = document.getElementById("emailReg").value;
  const pass = document.getElementById("passReg").value;

  if(!mail || !pass){
    alert("Isi email & password!");
    return;
  }

  createUserWithEmailAndPassword(auth, mail, pass)
  .then(async res=>{

    await setDoc(doc(db,"users",res.user.uid), {
      email: mail,
      status: "FREE",
      expired: 0,
      createdAt: Date.now()
    });

    alert("Akun berhasil dibuat!");
  })
  .catch(e=>alert(e.message));
};

/* ================= LOGIN ================= */
window.login = function(){
  signInWithEmailAndPassword(auth,email.value,password.value)
  .catch(()=>alert("Login gagal"));
};

/* ================= AUTO LOGIN ================= */
onAuthStateChanged(auth, async user=>{
  if(user){
    loginBox.classList.add("hidden");
    dashboard.classList.remove("hidden");
    userEmail.innerText = user.email;

    const ref = doc(db,"users",user.uid);
    const snap = await getDoc(ref);

    let status = "FREE";
    let expired = 0;

    if(snap.exists()){
      const data = snap.data();
      status = data.status || "FREE";
      expired = data.expired || 0;
    }

    // AUTO EXPIRED
    if(expired && Date.now() > expired){
      status = "FREE";
    }

    statusUser.innerText = status;
  }
});

/* ================= LOGOUT ================= */
window.logout = ()=>signOut(auth).then(()=>location.reload());

/* ================= CEK AKSES ================= */
window.cekAkses = function(level){
  const status = statusUser.innerText;

  if(level === "VIP" && status === "FREE"){
    alert("Harus VIP!");
    return false;
  }

  if(level === "PREMIUM" && status !== "PREMIUM"){
    alert("Harus PREMIUM!");
    return false;
  }

  return true;
};

/* ================= BELI ================= */
window.beli = function(paket){
  const kode = "TRX" + Math.floor(Math.random()*999999);

  const text = `Halo admin saya ingin membeli ${paket}
Kode: ${kode}`;

  window.open("https://wa.me/6289603266259?text="+encodeURIComponent(text));
};

/* ================= MENU ================= */
window.openPaket = ()=>{
  paketMenu.classList.toggle("hidden");
  bugMenu.classList.add("hidden");
};

window.openMenu = ()=>{
  bugMenu.classList.toggle("hidden");
  paketMenu.classList.add("hidden");
};

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ================= CONFIG ================= */
const firebaseConfig = {
  apiKey: "AIzaSyAgGd8-u_E_JKKs0Zf7rXZ6O4ADw85CUAU",
  authDomain: "radzpanel-3a8a3.firebaseapp.com",
  projectId: "radzpanel-3a8a3",
  storageBucket: "radzpanel-3a8a3.firebasestorage.app",
  messagingSenderId: "20608954308",
  appId: "1:20608954308:web:0e09ba796c9086813fbe91",
  measurementId: "G-VR4YG2S5L1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ================= REGISTER ================= */
window.register = function(){
  const mail = emailReg.value;
  const pass = passReg.value;

  if(!mail || !pass){
    alert("Isi email & password!");
    return;
  }

  createUserWithEmailAndPassword(auth, mail, pass)
  .then(async res=>{
    await setDoc(doc(db,"users",res.user.uid), {
      email: mail,
      status: "FREE",
      expired: 0,
      createdAt: Date.now()
    });

    alert("Akun berhasil dibuat!");
  })
  .catch(e=>alert(e.message));
};

/* ================= LOGIN ================= */
window.login = function(){
  signInWithEmailAndPassword(auth,email.value,password.value)
  .catch(()=>alert("Login gagal"));
};

/* ================= AUTO LOGIN ================= */
onAuthStateChanged(auth, async user=>{
  if(user){
    loginBox.classList.add("hidden");
    dashboard.classList.remove("hidden");
    userEmail.innerText = user.email;

    const ref = doc(db,"users",user.uid);
    const snap = await getDoc(ref);

    let status = "FREE";
    let expired = 0;

    if(snap.exists()){
      const data = snap.data();
      status = data.status || "FREE";
      expired = data.expired || 0;
    }

    if(expired && Date.now() > expired){
      status = "FREE";
    }

    statusUser.innerText = status;
  }
});

window.logout = ()=>signOut(auth).then(()=>location.reload());

/* ================= AUTO UPGRADE ================= */
window.beli = async function(paket){
  const user = auth.currentUser;

  if(!user){
    alert("Login dulu!");
    return;
  }

  let status = "FREE";
  let expired = 0;

  if(paket.toLowerCase().includes("vip")){
    status = "VIP";
    expired = Date.now() + (30*24*60*60*1000);
  }

  if(paket.toLowerCase().includes("premium")){
    status = "PREMIUM";
    expired = Date.now() + (30*24*60*60*1000);
  }

  await updateDoc(doc(db,"users",user.uid), {
    status: status,
    expired: expired
  });

  statusUser.innerText = status;

  const kode = "TRX" + Math.floor(Math.random()*999999);

  window.open("https://wa.me/6289603266259?text=" +
    encodeURIComponent("Saya membeli "+paket+" | "+kode)
  );

  alert("Berhasil upgrade ke " + status);
};

/* ================= CEK AKSES ================= */
window.cekAkses = function(level){
  const status = statusUser.innerText;

  if(level === "VIP" && status === "FREE"){
    alert("Harus VIP!");
    return false;
  }

  if(level === "PREMIUM" && status !== "PREMIUM"){
    alert("Harus PREMIUM!");
    return false;
  }

  return true;
};

/* ================= MENU ================= */
window.openPaket = ()=>{
  paketMenu.classList.toggle("hidden");
  bugMenu.classList.add("hidden");
};

window.openMenu = ()=>{
  bugMenu.classList.toggle("hidden");
  paketMenu.classList.add("hidden");
};
</script>

</body>
