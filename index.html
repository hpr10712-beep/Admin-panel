<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>ADMIN MENU</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white flex items-center justify-center h-screen">
    <div class="bg-slate-900 p-12 rounded-[3rem] border border-slate-800 text-center shadow-2xl">
        <h1 class="text-3xl font-black text-yellow-500 mb-10 italic tracking-widest">CONTROL PANEL</h1>
        <div class="grid gap-6">
            <button onclick="win('A')" class="bg-blue-600 hover:bg-blue-500 py-6 px-10 rounded-2xl text-xl font-black transition active:scale-95">WIN PLAYER A</button>
            <button onclick="win('B')" class="bg-red-600 hover:bg-red-500 py-6 px-10 rounded-2xl text-xl font-black transition active:scale-95">WIN PLAYER B</button>
        </div>
        <p class="mt-8 text-slate-500 text-[10px] uppercase">Data dikirim via BroadcastChannel</p>
    </div>
    <script>
        const bc = new BroadcastChannel('laga_premium');
        function win(p) { bc.postMessage({ type: 'RESULT', winner: p }); alert('Pemenang ' + p + ' diumumkan!'); }
    </script>
</body>
</html>
