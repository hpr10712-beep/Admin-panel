<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200">
    <title>MASTER CONTROL | LAGA PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; font-family: 'Inter', sans-serif; color: white; width: 1200px; margin: 0 auto; padding: 40px; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .glass-admin { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); border-radius: 2.5rem; }
        .log-table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        .log-table tr { background: rgba(255,255,255,0.02); }
        .log-table td { padding: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div class="flex justify-between items-center mb-10">
        <div>
            <h1 class="text-4xl font-orbitron font-black text-yellow-500 italic uppercase tracking-tighter">Master Control</h1>
            <p class="text-slate-500 font-bold text-xs uppercase tracking-[0.3em] mt-1">Live Transaction Monitoring</p>
        </div>
        <div id="status" class="bg-green-500/10 text-green-500 px-6 py-2 rounded-full border border-green-500/20 text-xs font-black animate-pulse">SYSTEM ONLINE</div>
    </div>

    <div class="grid grid-cols-3 gap-10">
        <div class="col-span-1 space-y-6">
            <div class="glass-admin p-8 border-l-8 border-blue-600">
                <h3 class="font-orbitron font-bold mb-4 text-blue-400 uppercase">Set Blue Victory</h3>
                <button onclick="setWinner('A')" class="w-full bg-blue-600 hover:bg-blue-500 py-6 rounded-2xl font-black font-orbitron text-lg transition-all active:scale-95 shadow-lg shadow-blue-900/40 uppercase">Declare A Win</button>
            </div>

            <div class="glass-admin p-8 border-l-8 border-red-600">
                <h3 class="font-orbitron font-bold mb-4 text-red-400 uppercase">Set Red Victory</h3>
                <button onclick="setWinner('B')" class="w-full bg-red-600 hover:bg-red-500 py-6 rounded-2xl font-black font-orbitron text-lg transition-all active:scale-95 shadow-lg shadow-red-900/40 uppercase">Declare B Win</button>
            </div>
            
            <button onclick="clearLogs()" class="w-full text-slate-600 hover:text-white text-[10px] font-bold uppercase tracking-widest underline mt-4">Clear Admin Logs</button>
        </div>

        <div class="col-span-2 glass-admin p-10 min-h-[600px] flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-orbitron font-black tracking-widest italic">Live Transaction Log</h2>
                <span class="text-[10px] text-slate-500 font-bold uppercase">Showing last 10 activities</span>
            </div>

            <div class="flex-grow overflow-hidden">
                <table class="log-table font-mono text-sm">
                    <thead class="text-slate-500 uppercase text-[10px] tracking-widest">
                        <tr>
                            <td class="pb-4">Waktu</td>
                            <td class="pb-4">Aksi</td>
                            <td class="pb-4">Nominal</td>
                            <td class="pb-4">Status Saldo</td>
                        </tr>
                    </thead>
                    <tbody id="adminLogs">
                        </tbody>
                </table>
                <div id="emptyMsg" class="h-full flex items-center justify-center text-slate-700 italic py-20 font-orbitron">Waiting for user bets...</div>
            </div>
        </div>
    </div>

    <script>
        const bc = new BroadcastChannel('laga_premium');
        let logs = JSON.parse(localStorage.getItem('admin_monitor_logs')) || [];

        function renderLogs() {
            const container = document.getElementById('adminLogs');
            const empty = document.getElementById('emptyMsg');
            
            if(logs.length > 0) {
                empty.style.display = 'none';
                container.innerHTML = logs.map(log => `
                    <tr class="animate__animated animate__fadeInLeft">
                        <td class="text-slate-500">${log.time}</td>
                        <td class="font-bold uppercase ${log.type === 'win' ? 'text-green-500' : log.type === 'lose' ? 'text-red-500' : 'text-blue-400'}">${log.desc}</td>
                        <td class="font-bold italic">Rp ${log.amount.toLocaleString()}</td>
                        <td class="text-yellow-500 font-bold">Rp ${log.balance.toLocaleString()}</td>
                    </tr>
                `).join('');
            }
        }

        // MENERIMA UPDATE DARI USER SECARA REAL-TIME
        bc.onmessage = (e) => {
            if(e.data.type === 'USER_ACTIVITY') {
                const now = new Date();
                const timeStr = now.toLocaleTimeString('id-ID');
                
                logs.unshift({
                    time: timeStr,
                    desc: e.data.desc,
                    amount: e.data.amount,
                    balance: e.data.balance,
                    type: e.data.status
                });

                if(logs.length > 15) logs.pop();
                localStorage.setItem('admin_monitor_logs', JSON.stringify(logs));
                renderLogs();
            }
        };

        function setWinner(p) {
            Swal.fire({
                title: 'Confirm Result',
                text: `Kirim kemenangan untuk ${p === 'A' ? 'SATRIA BIRU' : 'NAGA MERAH'}?`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: p === 'A' ? '#2563eb' : '#dc2626',
                background: '#0f172a', color: '#fff'
            }).then((res) => {
                if(res.isConfirmed) {
                    bc.postMessage({ type: 'RESULT', winner: p });
                }
            });
        }

        function clearLogs() { logs = []; localStorage.removeItem('admin_monitor_logs'); location.reload(); }
        renderLogs();
    </script>
</body>
</html>
