<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBro - Admin Ultimate</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #050505;
            --bg-gradient: radial-gradient(circle at top right, #112230, #050505 50%);
            --surface: rgba(255, 255, 255, 0.03);
            --surface-hover: rgba(255, 255, 255, 0.08);
            --accent: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.15);
            --danger: #ef4444;
            --danger-glow: rgba(239, 68, 68, 0.15);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); background-image: var(--bg-gradient); color: var(--text); min-height: 100vh; display: flex; overflow: hidden; }

        /* GLASSMORPHISM UTILITIES */
        .glass { background: var(--surface); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--border); }

        /* SIDEBAR */
        aside { width: 280px; display: flex; flex-direction: column; padding: 25px 20px; border-right: 1px solid var(--border); z-index: 10; }
        .logo { font-size: 1.8rem; font-weight: 800; color: var(--text); letter-spacing: -0.5px; margin-bottom: 40px; padding: 0 10px; display: flex; align-items: center; gap: 10px; }
        .logo i { color: var(--accent); font-size: 1.5rem; text-shadow: 0 0 15px var(--accent-glow); }
        .logo span { color: var(--accent); }
        
        .nav-menu { display: flex; flex-direction: column; gap: 8px; flex: 1; }
        .nav-item { padding: 14px 18px; border-radius: 12px; display: flex; align-items: center; gap: 15px; color: var(--text-dim); font-weight: 500; text-decoration: none; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; border: 1px solid transparent; }
        .nav-item:hover { color: var(--text); background: var(--surface-hover); transform: translateX(5px); }
        .nav-item.active { background: linear-gradient(90deg, rgba(16,185,129,0.1) 0%, transparent 100%); color: var(--accent); border-left: 3px solid var(--accent); font-weight: 600; }

        /* MAIN CONTENT */
        main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 40px 50px; scroll-behavior: smooth; }
        
        /* HEADER */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; animation: slideDown 0.5s ease; }
        .header-title h1 { font-size: 2rem; font-weight: 700; margin-bottom: 5px; }
        .header-title p { color: var(--text-dim); font-size: 0.95rem; }
        .admin-profile { display: flex; align-items: center; gap: 15px; padding: 8px 15px 8px 8px; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        .admin-profile:hover { background: var(--surface-hover); }
        .admin-profile img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--accent); padding: 2px; }

        /* STATS GRID */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; margin-bottom: 40px; animation: fadeIn 0.8s ease; }
        .stat-card { border-radius: 24px; padding: 25px; display: flex; align-items: center; gap: 20px; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden; }
        .stat-card::before { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); transform: skewX(-20deg); transition: 0.5s; }
        .stat-card:hover { transform: translateY(-8px); border-color: rgba(16, 185, 129, 0.4); box-shadow: 0 15px 30px var(--accent-glow); }
        .stat-card:hover::before { left: 150%; }
        
        .stat-icon { width: 65px; height: 65px; border-radius: 18px; display: flex; justify-content: center; align-items: center; font-size: 1.8rem; flex-shrink: 0; }
        .icon-green { background: rgba(16, 185, 129, 0.1); color: var(--accent); }
        .icon-blue { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .icon-purple { background: rgba(168, 85, 247, 0.1); color: #a855f7; }
        
        .stat-info h3 { font-size: 2.2rem; font-weight: 800; margin-bottom: 2px; line-height: 1; }
        .stat-info p { color: var(--text-dim); font-size: 0.9rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }

        /* TABLE AREA */
        .table-section { animation: slideUp 0.8s ease; }
        .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .table-header h2 { font-size: 1.4rem; font-weight: 600; }
        
        /* MODERN TABLE STYLE */
        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; text-align: left; }
        th { padding: 0 25px 10px; font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        
        tr.user-row td { background: var(--surface); padding: 20px 25px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); transition: 0.3s; backdrop-filter: blur(5px); }
        tr.user-row td:first-child { border-left: 1px solid var(--border); border-radius: 16px 0 0 16px; }
        tr.user-row td:last-child { border-right: 1px solid var(--border); border-radius: 0 16px 16px 0; }
        
        tr.user-row:hover td { background: var(--surface-hover); transform: scale(1.01); border-color: rgba(255,255,255,0.1); }

        .user-cell { display: flex; align-items: center; gap: 15px; }
        .user-pfp { width: 50px; height: 50px; border-radius: 14px; object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .user-name { font-weight: 600; font-size: 1.05rem; margin-bottom: 4px; }
        .user-id { font-size: 0.75rem; font-weight: 600; background: rgba(16, 185, 129, 0.1); color: var(--accent); padding: 4px 10px; border-radius: 6px; display: inline-block; }
        
        .badge { background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; color: var(--text-dim); border: 1px solid var(--border); }
        
        .btn-action { background: rgba(239, 68, 68, 0.05); border: 1px solid rgba(239, 68, 68, 0.2); color: var(--danger); padding: 10px 18px; border-radius: 12px; cursor: pointer; transition: 0.3s; font-size: 0.9rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .btn-action:hover { background: var(--danger); color: white; box-shadow: 0 5px 15px var(--danger-glow); transform: translateY(-2px); }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        /* ANIMATIONS */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* RESPONSIVE */
        @media(max-width: 900px) {
            body { flex-direction: column; overflow-y: auto; }
            aside { width: 100%; height: auto; flex-direction: row; align-items: center; border-right: none; border-bottom: 1px solid var(--border); padding: 15px 20px; background: rgba(5,5,5,0.9); backdrop-filter: blur(10px); position: sticky; top: 0; }
            .logo { margin-bottom: 0; font-size: 1.5rem; }
            .nav-menu { flex-direction: row; margin-left: auto; justify-content: flex-end; }
            .nav-item span { display: none; }
            main { padding: 25px 20px; overflow-y: visible; }
            .table-section { overflow-x: auto; padding-bottom: 20px; }
            table { min-width: 700px; }
        }
    </style>
</head>
<body>

    <aside>
        <div class="logo"><i class="fas fa-bolt"></i> My<span>Bro</span></div>
        <div class="nav-menu">
            <div class="nav-item active"><i class="fas fa-border-all"></i> <span>Dashboard</span></div>
            <div class="nav-item" onclick="alert('Laporan sedang dikembangkan!')"><i class="fas fa-chart-line"></i> <span>Analytics</span></div>
            <div class="nav-item" onclick="alert('Pengaturan segera hadir!')"><i class="fas fa-sliders-h"></i> <span>Settings</span></div>
        </div>
    </aside>

    <main>
        <header>
            <div class="header-title">
                <h1>Overview</h1>
                <p>Pantau semua aktivitas pengguna secara real-time</p>
            </div>
            <div class="glass admin-profile">
                <div style="text-align: right; margin-right: 5px;">
                    <div style="font-weight: 600; font-size: 0.95rem;">Super Admin</div>
                    <div style="font-size: 0.75rem; color: var(--accent);">Online</div>
                </div>
                <img src="https://ui-avatars.com/api/?name=Admin&background=10b981&color=fff&bold=true" alt="Admin">
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card glass">
                <div class="stat-icon icon-green"><i class="fas fa-users"></i></div>
                <div class="stat-info">
                    <h3 id="statUsers">...</h3>
                    <p>Total Pengguna</p>
                </div>
            </div>
            <div class="stat-card glass">
                <div class="stat-icon icon-blue"><i class="fas fa-comment-dots"></i></div>
                <div class="stat-info">
                    <h3 id="statChats">...</h3>
                    <p>Ruang Obrolan</p>
                </div>
            </div>
            <div class="stat-card glass">
                <div class="stat-icon icon-purple"><i class="fas fa-circle-notch"></i></div>
                <div class="stat-info">
                    <h3 id="statStories">...</h3>
                    <p>Status Aktif</p>
                </div>
            </div>
        </div>

        <div class="table-section">
            <div class="table-header">
                <h2>Daftar Pengguna</h2>
                <div style="color: var(--text-dim); font-size: 0.9rem;"><i class="fas fa-sync fa-spin" style="margin-right:5px; font-size:0.8rem;"></i> Live Data</div>
            </div>
            
            <table id="usersTable">
                <thead>
                    <tr>
                        <th>Profil Pengguna</th>
                        <th>Bio / Status</th>
                        <th>Koneksi</th>
                        <th style="text-align: right;">Aksi</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <tr class="user-row">
                        <td colspan="4" style="text-align:center; padding:40px; color:var(--text-dim); border-radius: 16px;">
                            <i class="fas fa-circle-notch fa-spin fa-2x" style="color: var(--accent); margin-bottom: 15px;"></i><br>
                            Membaca database...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Konfigurasi API Database yang sama
        const firebaseConfig = {
            apiKey: "AIzaSyCHr0eemIkfHNFDUkSaFDklp_c1OgmSnl8",
            authDomain: "mybro-9ba5f.firebaseapp.com",
            databaseURL: "https://mybro-9ba5f-default-rtdb.firebaseio.com/",
            projectId: "mybro-9ba5f"
        };
        const app_fire = initializeApp(firebaseConfig);
        const db = getDatabase(app_fire);

        const tbody = document.getElementById('usersTableBody');
        
        // 1. Monitor Data Pengguna
        onValue(ref(db, 'users'), (snapshot) => {
            if (!snapshot.exists()) {
                document.getElementById('statUsers').innerText = "0";
                tbody.innerHTML = `<tr class="user-row"><td colspan="4" style="text-align:center; border-radius:16px;">Belum ada data pengguna.</td></tr>`;
                return;
            }

            const users = snapshot.val();
            const userKeys = Object.keys(users);
            
            // Animasi angka (counter)
            animateValue("statUsers", 0, userKeys.length, 1000);
            
            tbody.innerHTML = ""; 
            
            userKeys.forEach((uid, index) => {
                const profile = users[uid].profile || { name: 'User '+uid, bio: '-', pfp: '' };
                const pfp = profile.pfp || `https://ui-avatars.com/api/?name=${profile.name}&background=1e293b&color=fff`;
                const contactsCount = users[uid].contacts ? Object.keys(users[uid].contacts).length : 0;
                
                const tr = document.createElement('tr');
                tr.className = 'user-row';
                // Memberikan efek delay masuk pada setiap baris
                tr.style.animation = `fadeIn 0.5s ease ${index * 0.1}s both`;
                
                tr.innerHTML = `
                    <td>
                        <div class="user-cell">
                            <img src="${pfp}" class="user-pfp" alt="PFP">
                            <div>
                                <div class="user-name">${profile.name}</div>
                                <div class="user-id"><i class="fas fa-fingerprint" style="margin-right:3px;"></i> ${uid}</div>
                            </div>
                        </div>
                    </td>
                    <td>
                        <div style="color:var(--text-dim); font-size:0.95rem; max-width:250px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
                            ${profile.bio || 'Tidak ada bio'}
                        </div>
                    </td>
                    <td>
                        <span class="badge"><i class="fas fa-link" style="margin-right:5px; color:var(--accent);"></i> ${contactsCount} Teman</span>
                    </td>
                    <td style="text-align: right;">
                        <button class="btn-action" onclick="window.deleteUser('${uid}', '${profile.name}')" style="margin-left: auto;">
                            <i class="fas fa-trash-alt"></i> Hapus
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        });

        // 2. Monitor Ruang Obrolan
        onValue(ref(db, 'chats'), (snapshot) => {
            const count = snapshot.exists() ? Object.keys(snapshot.val()).length : 0;
            animateValue("statChats", 0, count, 1000);
        });

        // 3. Monitor Status/Stories
        onValue(ref(db, 'stories'), (snapshot) => {
            const count = snapshot.exists() ? Object.keys(snapshot.val()).length : 0;
            animateValue("statStories", 0, count, 1000);
        });

        // FUNGSI ANIMASI ANGKA STATISTIK
        function animateValue(id, start, end, duration) {
            if (start === end) { document.getElementById(id).innerHTML = end; return; }
            let range = end - start;
            let current = start;
            let increment = end > start ? 1 : -1;
            let stepTime = Math.abs(Math.floor(duration / range));
            let obj = document.getElementById(id);
            let timer = setInterval(function() {
                current += increment;
                obj.innerHTML = current;
                if (current == end) clearInterval(timer);
            }, stepTime);
        }

        // FUNGSI HAPUS USER
        window.deleteUser = (uid, name) => {
            if(confirm(`HAPUS PENGGUNA?\n\nApakah Anda yakin ingin menghapus "${name}" (${uid}) selamanya? Data tidak dapat dikembalikan.`)) {
                set(ref(db, `users/${uid}`), null).then(() => {
                    // Berhasil dihapus (tabel akan auto-update dari Firebase onValue)
                }).catch(err => {
                    alert("Gagal menghapus: " + err.message);
                });
            }
        };
    </script>
</body>
</html>
