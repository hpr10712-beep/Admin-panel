<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>MyBro - High Tech Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #0a0a0c;
            --bg-side: #0f0f12;
            --card-bg: #16161a;
            --accent: #00ffaa; /* Neon Green */
            --accent-glow: rgba(0, 255, 170, 0.2);
            --border: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --text-dim: #888888;
            --danger: #ff4d4d;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        
        /* Memaksa Tampilan Desktop Luas */
        body { 
            background: var(--bg-main); 
            color: var(--text-main); 
            min-width: 1300px; 
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* SIDEBAR: Dibuat lebih slim dan elegan */
        aside { 
            width: 240px; 
            min-width: 240px;
            background: var(--bg-side); 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            padding: 24px;
        }

        .brand { 
            font-size: 1.4rem; font-weight: 800; color: var(--accent);
            display: flex; align-items: center; gap: 10px; margin-bottom: 40px;
            text-transform: uppercase; letter-spacing: 2px;
        }

        .nav-item {
            padding: 12px 16px; border-radius: 8px; color: var(--text-dim);
            text-decoration: none; display: flex; align-items: center; gap: 12px;
            margin-bottom: 8px; transition: 0.2s; cursor: pointer; font-size: 0.9rem;
        }
        .nav-item:hover, .nav-item.active { 
            background: rgba(255,255,255,0.03); color: var(--text-main);
            border: 1px solid var(--border);
        }
        .nav-item.active { border-left: 3px solid var(--accent); color: var(--accent); }

        /* KONTEN UTAMA */
        main { flex: 1; overflow-y: auto; padding: 30px 40px; }

        /* HEADER: Padat & Rapi */
        header { 
            display: flex; justify-content: space-between; align-items: flex-end;
            margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid var(--border);
        }
        .header-left h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 5px; }
        .header-left p { color: var(--text-dim); font-size: 0.9rem; }

        .search-container {
            position: relative; width: 350px;
        }
        .search-container input {
            width: 100%; background: var(--card-bg); border: 1px solid var(--border);
            padding: 12px 12px 12px 40px; border-radius: 10px; color: white;
            outline: none; transition: 0.3s;
        }
        .search-container input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }
        .search-container i { position: absolute; left: 15px; top: 14px; color: var(--text-dim); }

        /* STATS: Card Kecil & Elegan */
        .stats-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; 
        }
        .stat-box { 
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 20px; border-radius: 16px; position: relative; overflow: hidden;
        }
        .stat-box::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px;
            background: var(--accent); opacity: 0.3;
        }
        .stat-label { color: var(--text-dim); font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 2rem; font-weight: 800; margin-top: 5px; color: var(--accent); }

        /* USER GRID: Sangat Rapi */
        .user-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; 
        }

        .user-card { 
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 14px; padding: 18px; transition: 0.3s;
            display: flex; flex-direction: column; gap: 15px; position: relative;
        }
        .user-card:hover { border-color: rgba(255,255,255,0.2); background: #1c1c21; transform: translateY(-3px); }

        .card-header { display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; border: 1px solid var(--border); }
        .user-info h3 { font-size: 1rem; font-weight: 700; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
        .user-status { font-size: 0.7rem; color: var(--accent); font-weight: 600; text-transform: uppercase; display: flex; align-items: center; gap: 4px; }

        .user-bio { font-size: 0.8rem; color: var(--text-dim); line-height: 1.4; height: 35px; overflow: hidden; }

        .card-footer { 
            display: flex; justify-content: space-between; align-items: center;
            padding-top: 15px; border-top: 1px solid var(--border);
        }
        .friend-count { font-size: 0.8rem; color: var(--text-dim); }
        .friend-count b { color: var(--text-main); }

        .btn-del {
            background: rgba(255, 77, 77, 0.1); color: var(--danger);
            border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer;
            font-size: 0.8rem; font-weight: 600; transition: 0.2s;
        }
        .btn-del:hover { background: var(--danger); color: white; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    </style>
</head>
<body>

    <aside>
        <div class="brand"><i class="fas fa-layer-group"></i> MyBro</div>
        <div class="nav-item active"><i class="fas fa-home"></i> Dashboard</div>
        <div class="nav-item" onclick="location.reload()"><i class="fas fa-sync"></i> Refresh Database</div>
        <div class="nav-item"><i class="fas fa-users"></i> User List</div>
        <div class="nav-item"><i class="fas fa-cog"></i> Settings</div>
        
        <div style="margin-top: auto;">
            <div class="nav-item" style="color: var(--danger);"><i class="fas fa-sign-out-alt"></i> Logout Admin</div>
        </div>
    </aside>

    <main>
        <header>
            <div class="header-left">
                <h1>Server Overview</h1>
                <p>Monitoring data user dan aktivitas sistem secara real-time.</p>
            </div>
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" id="search" placeholder="Cari user berdasarkan nama atau ID..." oninput="window.filterUsers()">
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-label">Total Users</div>
                <div class="stat-value" id="countUsers">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Conversations</div>
                <div class="stat-value" id="countChats">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">System Stories</div>
                <div class="stat-value" id="countStories">0</div>
            </div>
            <div class="stat-box" style="border-color: var(--accent);">
                <div class="stat-label">Server Status</div>
                <div class="stat-value" style="font-size: 1.2rem; padding-top: 10px;">OPERATIONAL</div>
            </div>
        </div>

        <h2 style="margin-bottom: 20px; font-size: 1.2rem; letter-spacing: 1px;">DATABASE EXPLORER</h2>
        <div class="user-grid" id="userGrid">
            <div style="color: var(--text-dim);">Menghubungkan ke Firebase...</div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCHr0eemIkfHNFDUkSaFDklp_c1OgmSnl8",
            authDomain: "mybro-9ba5f.firebaseapp.com",
            databaseURL: "https://mybro-9ba5f-default-rtdb.firebaseio.com/",
            projectId: "mybro-9ba5f"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // SYNC USERS
        onValue(ref(db, 'users'), (snap) => {
            const grid = document.getElementById('userGrid');
            grid.innerHTML = "";
            if(!snap.exists()) return;

            const users = snap.val();
            const keys = Object.keys(users);
            document.getElementById('countUsers').innerText = keys.length;

            keys.forEach(uid => {
                const u = users[uid];
                const p = u.profile || { name: 'User '+uid, bio: 'Hey there!', pfp: '' };
                const pfp = p.pfp || `https://ui-avatars.com/api/?name=${p.name}&background=333&color=fff`;
                const friends = u.contacts ? Object.keys(u.contacts).length : 0;

                const card = document.createElement('div');
                card.className = 'user-card';
                card.dataset.search = (p.name + uid).toLowerCase();
                
                card.innerHTML = `
                    <div class="card-header">
                        <img src="${pfp}" class="user-avatar">
                        <div class="user-info">
                            <h3>${p.name}</h3>
                            <div class="user-status"><i class="fas fa-circle" style="font-size: 0.5rem;"></i> Active ID: ${uid}</div>
                        </div>
                    </div>
                    <div class="user-bio">${p.bio}</div>
                    <div class="card-footer">
                        <div class="friend-count"><i class="fas fa-link"></i> <b>${friends}</b> Friends</div>
                        <button class="btn-del" onclick="window.delUser('${uid}', '${p.name}')">Delete</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        });

        // SYNC STATS
        onValue(ref(db, 'chats'), s => document.getElementById('countChats').innerText = s.exists() ? Object.keys(s.val()).length : 0);
        onValue(ref(db, 'stories'), s => document.getElementById('countStories').innerText = s.exists() ? Object.keys(s.val()).length : 0);

        // FUNCTIONS
        window.filterUsers = () => {
            const q = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.user-card').forEach(c => {
                c.style.display = c.dataset.search.includes(q) ? "flex" : "none";
            });
        };

        window.delUser = (id, name) => {
            if(confirm(`Hapus user ${name}?`)) set(ref(db, `users/${id}`), null);
        };
    </script>
</body>
</html>
