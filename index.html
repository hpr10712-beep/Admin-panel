<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radz Store Elite</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#000;
  color:#fff;
}

.container{
  max-width:500px;
  margin:auto;
  padding:20px;
}

.card{
  background:#111;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:red;
  color:#fff;
  cursor:pointer;
}

/* SLIDER */
.slider-container{
  aspect-ratio:16/9;
  overflow:hidden;
  border-radius:10px;
}

.slider{
  display:flex;
  transition:0.4s;
}

.slider img{
  width:100%;
  flex-shrink:0;
  object-fit:cover;
}

.dots{
  text-align:center;
  margin-top:5px;
}
.dots span{
  display:inline-block;
  width:8px;
  height:8px;
  background:#555;
  border-radius:50%;
  margin:3px;
}
.dots .active{background:red}

.hidden{display:none;}
</style>
</head>

<body>

<div class="container" id="loginBox">
<h2>Login</h2>
<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>
<button onclick="login()">LOGIN</button>
</div>

<div class="container hidden" id="dashboard">

<div class="card">
<b id="userEmail"></b><br>
Status: <span id="statusUser">FREE</span>
</div>

<div class="card">
<div class="slider-container">
<div class="slider" id="slider">
<img src="https://picsum.photos/400/200?1">
<img src="https://picsum.photos/400/200?2">
<img src="https://picsum.photos/400/200?3">
</div>
</div>
<div class="dots" id="dots"></div>
</div>

<div class="card">
<button onclick="openPaket()">BELI PAKET</button>
<button onclick="openMenu()">MENU</button>
<button onclick="logout()">LOGOUT</button>
</div>

<div id="paketMenu" class="hidden card">
<button onclick="beli('VIP')">VIP</button>
<button onclick="beli('PREMIUM')">PREMIUM</button>
</div>

<div id="bugMenu" class="hidden card">
<button onclick="akses('VIP')">FITUR VIP</button>
<button onclick="akses('PREMIUM')">FITUR PREMIUM</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* CONFIG KAMU */
const firebaseConfig = {
  apiKey: "AIzaSyAgGd8-u_E_JKKs0Zf7rXZ6O4ADw85CUAU",
  authDomain: "radzpanel-3a8a3.firebaseapp.com",
  projectId: "radzpanel-3a8a3",
  storageBucket: "radzpanel-3a8a3.firebasestorage.app",
  messagingSenderId: "20608954308",
  appId: "1:20608954308:web:0e09ba796c9086813fbe91",
  measurementId: "G-VR4YG2S5L1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ================= LOGIN ================= */
window.login = function(){
  signInWithEmailAndPassword(auth,email.value,password.value)
  .catch(()=>{
    showPopup("Login Gagal","error");
  });
};

/* ================= AUTO LOGIN ================= */
onAuthStateChanged(auth, async user=>{
  if(user){
    loginBox.classList.add("hidden");
    dashboard.classList.remove("hidden");
    userEmail.innerText = user.email;

    const ref = doc(db, "users", user.uid);
    const snap = await getDoc(ref);

    let status = "FREE";
    let expired = 0;

    if(snap.exists()){
      const data = snap.data();
      status = data.status || "FREE";
      expired = data.expired || 0;
    }

    // CEK EXPIRED
    const now = Date.now();
    if(expired && now > expired){
      status = "FREE";
    }

    document.getElementById("statusUser").innerText = status;
  }
});

/* ================= LOGOUT ================= */
window.logout = ()=>signOut(auth).then(()=>location.reload());

/* ================= CEK AKSES ================= */
window.cekAkses = function(level){
  const status = document.getElementById("statusUser").innerText;

  if(level === "VIP" && status === "FREE"){
    showPopup("Butuh VIP!","error");
    return false;
  }

  if(level === "PREMIUM" && status !== "PREMIUM"){
    showPopup("Butuh PREMIUM!","error");
    return false;
  }

  return true;
};

/* ================= BELI (AUTO WA) ================= */
window.beli = function(paket){
  let text = "";

  if(paket === "VIP"){
    text = "Halo admin saya ingin membeli VIP";
  }

  if(paket === "PREMIUM"){
    text = "Halo admin saya ingin membeli PREMIUM";
  }

  if(paket.includes("Seumur")){
    text = "Halo admin saya ingin membeli Paket Lifetime";
  }

  window.open("https://wa.me/6289603266259?text=" + encodeURIComponent(text));
};

  </script>

</body>
</html>
