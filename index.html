<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADMIN PANEL RADZ</title>

<style>
body{
  background:#000;
  color:#fff;
  font-family:sans-serif;
  text-align:center;
  padding:20px;
}

.card{
  background:#111;
  padding:20px;
  border-radius:10px;
  margin:15px 0;
}

input,button{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:8px;
}

button{
  background:linear-gradient(90deg,#ff6b6b,#4ecdc4);
  cursor:pointer;
}
</style>
</head>

<body>

<h1>🔥 ADMIN PANEL</h1>

<div class="card">
  <h3>Login Admin</h3>
  <input id="email" placeholder="Email admin">
  <input id="password" type="password" placeholder="Password">
  <button onclick="loginAdmin()">LOGIN</button>
</div>

<div id="panel" class="hidden">

  <div class="card">
    <h3>Create User (Auto Save)</h3>
    <input id="newEmail" placeholder="Email user">
    <input id="newPass" placeholder="Password">
    <button onclick="createUser()">CREATE USER</button>
  </div>

  <div class="card">
    <h3>📡 User List (LIVE)</h3>
    <div id="listUser"></div>
  </div>

  <button onclick="logoutAdmin()">LOGOUT</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAgGd8-u_E_JKKs0Zf7rXZ6O4ADw85CUAU",
  authDomain: "radzpanel-3a8a3.firebaseapp.com",
  projectId: "radzpanel-3a8a3"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);


// 🔐 LOGIN ADMIN
window.loginAdmin = function(){
  signInWithEmailAndPassword(auth,email.value,password.value)
  .then(()=>{
    alert("Login sukses 🔥");
    document.getElementById("panel").classList.remove("hidden");
    loadUsers();
  })
  .catch(e=>{
    alert(e.message);
  });
};


// ➕ CREATE USER (AUTO SAVE FIREBASE)
window.createUser = async function(){
  if(!newEmail.value || !newPass.value){
    alert("Isi dulu!");
    return;
  }

  await addDoc(collection(db,"users"),{
    email:newEmail.value,
    password:newPass.value,
    created:new Date().toLocaleString()
  });

  alert("User tersimpan ke Firebase 🔥");

  newEmail.value="";
  newPass.value="";
};


// 📡 REALTIME AUTO UPDATE
function loadUsers(){
  onSnapshot(collection(db,"users"),(snap)=>{
    let html="";
    snap.forEach(doc=>{
      let d=doc.data();
      html+=`
        <div style="background:#222;padding:10px;margin:5px;border-radius:8px">
          📧 ${d.email}<br>
          🔑 ${d.password}
        </div>
      `;
    });

    listUser.innerHTML=html;
  });
}


// 🚪 LOGOUT
window.logoutAdmin = ()=>signOut(auth).then(()=>location.reload());

</script>

</body>
</html>
