<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radz Store Elite Panel</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

:root {
  --accent-primary: linear-gradient(135deg,#ff6b6b,#4ecdc4);
}

body{
  margin:0;
  font-family:'Orbitron',monospace;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* GRID */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background-image:
    linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
  background-size:40px 40px;
  z-index:-1;
}

/* GLOW */
body::after{
  content:"";
  position:fixed;
  width:500px;
  height:500px;
  background:radial-gradient(circle, rgba(255,107,107,0.35), transparent);
  top:20%;
  left:30%;
  filter:blur(120px);
  z-index:-1;
  animation:moveGlow 10s infinite alternate;
}
@keyframes moveGlow{
  0%{transform:translate(-50px,-50px);}
  100%{transform:translate(50px,50px);}
}

/* VIDEO */
#anime-bg{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-2;
  opacity:0.1;
}
#anime-bg video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* CONTAINER */
.container{
  max-width:1000px;
  margin:auto;
  padding:50px 20px;
}

/* HEADER */
.header{text-align:center;margin-bottom:40px;}
.header h1{
  font-size:50px;
  background:var(--accent-primary);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* TAB */
.tab-container{display:flex;gap:10px;margin-bottom:30px;}
.tab-btn{
  flex:1;
  padding:15px;
  border:none;
  border-radius:10px;
  background:#111;
  color:#aaa;
  cursor:pointer;
}
.tab-btn.active{
  background:var(--accent-primary);
  color:black;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
  background:#111;
  color:white;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:var(--accent-primary);
  color:black;
  cursor:pointer;
  margin-top:12px;
}

/* STATUS */
.status{
  margin-top:10px;
  padding:10px;
  border-radius:10px;
}
.success{background:green;}
.error{background:red;}

.hidden{display:none;}
</style>
</head>

<body>

<div id="anime-bg">
  <video autoplay muted loop>
    <source src="https://assets.mixkit.co/videos/preview/mixkit-abstract-neon-lines-in-motion-12166-large.mp4">
  </video>
</div>

<div class="container">

<div class="header">
  <h1>RADZ STORE</h1>
</div>

<div class="tab-container">
  <button class="tab-btn active" id="btnUser">USER</button>
  <button class="tab-btn" id="btnAdmin">ADMIN</button>
</div>

<!-- USER -->
<div id="userTab">
  <div class="card">
    <h2>Login User</h2>
    <input id="userEmail" placeholder="Email">
    <input id="userPassword" type="password" placeholder="Password">
    <div id="userStatus"></div>
  </div>

  <div id="userDashboard" class="hidden card">
    <h3 id="userInfo"></h3>
    <button id="logoutUser">LOGOUT</button>
  </div>
</div>

<!-- ADMIN -->
<div id="adminTab" class="hidden">
  <div class="card">
    <h2>Admin Panel</h2>
    <div id="adminInfo"></div>

    <input id="newEmail" placeholder="Email user">
    <input id="newPass" type="password" placeholder="Password">
    <button id="createBtn">CREATE USER</button>
    <div id="createStatus"></div>

    <button id="logoutAdmin">LOGOUT</button>
  </div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "ISI_APIKEY_KAMU",
  authDomain: "ISI_DOMAIN_KAMU",
  projectId: "ISI_PROJECT_KAMU",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* ELEMENT */
const userTab = document.getElementById("userTab");
const adminTab = document.getElementById("adminTab");
const btnUser = document.getElementById("btnUser");
const btnAdmin = document.getElementById("btnAdmin");

/* TAB */
btnUser.onclick = () => {
  userTab.classList.remove("hidden");
  adminTab.classList.add("hidden");
  btnUser.classList.add("active");
  btnAdmin.classList.remove("active");
};

btnAdmin.onclick = () => {
  adminTab.classList.remove("hidden");
  userTab.classList.add("hidden");
  btnAdmin.classList.add("active");
  btnUser.classList.remove("active");
};

/* LOGIN ENTER */
userPassword.addEventListener("keypress", (e)=>{
  if(e.key === "Enter"){
    signInWithEmailAndPassword(auth,userEmail.value,userPassword.value)
    .then(res=>{
      userDashboard.classList.remove("hidden");
      userInfo.innerText="Welcome "+res.user.email;
      userStatus.innerHTML=`<div class="status success">Login Success</div>`;
    })
    .catch(err=>{
      userStatus.innerHTML=`<div class="status error">${err.message}</div>`;
    });
  }
});

/* CREATE USER */
createBtn.onclick = () => {
  createUserWithEmailAndPassword(auth,newEmail.value,newPass.value)
  .then(()=>{
    createStatus.innerHTML=`<div class="status success">User Created</div>`;
  })
  .catch(err=>{
    createStatus.innerHTML=`<div class="status error">${err.message}</div>`;
  });
};

/* LOGOUT */
logoutUser.onclick = ()=>signOut(auth).then(()=>location.reload());
logoutAdmin.onclick = ()=>signOut(auth).then(()=>location.reload());

/* AUTO LOGIN STATUS */
onAuthStateChanged(auth,user=>{
  if(user){
    adminInfo.innerHTML=`<div class="status success">Login: ${user.email}</div>`;
  }
});
</script>

</body>
</html>
