<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radz Store Elite Panel</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

:root{
--accent:linear-gradient(135deg,#ff6b6b,#4ecdc4);
}

body{
margin:0;
font-family:'Orbitron',monospace;
background:#000;
color:#fff;
}

/* GRID */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background-image:
linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
background-size:40px 40px;
z-index:-1;
}

/* VIDEO BG */
#anime-bg{
position:fixed;
width:100%;
height:100%;
z-index:-2;
opacity:0.1;
}

#anime-bg video{
width:100%;
height:100%;
object-fit:cover;
}

/* CONTAINER */

.container{
max-width:900px;
margin:auto;
padding:40px 20px;
}

.header{
text-align:center;
margin-bottom:40px;
}

.header h1{
font-size:50px;
background:var(--accent);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* TAB */

.tab-container{
display:flex;
gap:10px;
margin-bottom:30px;
}

.tab-btn{
flex:1;
padding:15px;
border:none;
border-radius:10px;
background:#111;
color:#aaa;
cursor:pointer;
}

.tab-btn.active{
background:var(--accent);
color:black;
}

/* CARD */

.card{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

/* INPUT */

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
background:#111;
color:white;
}

/* BUTTON */

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:var(--accent);
color:black;
cursor:pointer;
margin-top:10px;
}

/* USER LIST */

.userBox{
background:#111;
padding:15px;
border-radius:10px;
margin-top:10px;
}

.status{
margin-top:10px;
padding:10px;
border-radius:10px;
}

.success{background:green}
.error{background:red}

.hidden{display:none}
</style>
</head>

<body>

<div id="anime-bg">
<video autoplay muted loop>
<source src="https://assets.mixkit.co/videos/preview/mixkit-abstract-neon-lines-in-motion-12166-large.mp4">
</video>
</div>

<div class="container">

<div class="header">
<h1>RADZ STORE</h1>
</div>

<div class="tab-container">
<button class="tab-btn active" id="btnUser">USER</button>
<button class="tab-btn" id="btnAdmin">ADMIN</button>
</div>


<!-- USER TAB -->

<div id="userTab">

<div class="card">

<h2>Login User</h2>

<input id="userEmail" placeholder="Email">
<input id="userPassword" type="password" placeholder="Password">

<button id="loginBtn">LOGIN</button>

<div id="userStatus"></div>

</div>

<div id="userDashboard" class="hidden card">

<button onclick="upgradeVIP()">UPGRADE VIP</button>
<button onclick="upgradePremium()">UPGRADE PREMIUM</button>

  <h3 id="userInfo"></h3>

<button id="logoutUser">LOGOUT</button>

</div>

</div>


<!-- ADMIN TAB -->

<div id="adminTab" class="hidden">

<div class="card">

<h2>Admin Panel</h2>

<div id="adminInfo"></div>

<input id="newEmail" placeholder="Email user">
<input id="newPass" type="password" placeholder="Password">

<button id="createBtn">CREATE USER</button>

<div id="createStatus"></div>

<button id="logoutAdmin">LOGOUT</button>

</div>

<h3>LIST USER</h3>

<div id="userList"></div>

</div>
  
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { 
getAuth,
signInWithEmailAndPassword,
createUserWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getDatabase,
ref,
set,
update,
onValue
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";


const firebaseConfig = {
  apiKey: "AIzaSyAgGd8-u_E_JKKs0Zf7rXZ6O4ADw85CUAU",
  authDomain: "radzpanel-3a8a3.firebaseapp.com",
  projectId: "radzpanel-3a8a3",
  storageBucket: "radzpanel-3a8a3.firebasestorage.app",
  messagingSenderId: "20608954308",
  appId: "1:20608954308:web:0e09ba796c9086813fbe91",
  measurementId: "G-VR4YG2S5L1"
};


const app = initializeApp(firebaseConfig);

const auth = getAuth(app);
const db = getDatabase(app);

/* ELEMENT */

const btnUser=document.getElementById("btnUser");
const btnAdmin=document.getElementById("btnAdmin");

const userTab=document.getElementById("userTab");
const adminTab=document.getElementById("adminTab");

const loginBtn=document.getElementById("loginBtn");

const userEmail=document.getElementById("userEmail");
const userPassword=document.getElementById("userPassword");

const userStatus=document.getElementById("userStatus");
const userDashboard=document.getElementById("userDashboard");
const userInfo=document.getElementById("userInfo");

const createBtn=document.getElementById("createBtn");
const newEmail=document.getElementById("newEmail");
const newPass=document.getElementById("newPass");

const createStatus=document.getElementById("createStatus");

const logoutUser=document.getElementById("logoutUser");
const logoutAdmin=document.getElementById("logoutAdmin");

const adminInfo=document.getElementById("adminInfo");

const userList=document.getElementById("userList");


/* TAB */

btnUser.onclick=()=>{

userTab.classList.remove("hidden");
adminTab.classList.add("hidden");

btnUser.classList.add("active");
btnAdmin.classList.remove("active");

}

btnAdmin.onclick=()=>{

adminTab.classList.remove("hidden");
userTab.classList.add("hidden");

btnAdmin.classList.add("active");
btnUser.classList.remove("active");

}


/* LOGIN USER */

loginBtn.onclick=()=>{

signInWithEmailAndPassword(auth,userEmail.value,userPassword.value)

.then(res=>{

userDashboard.classList.remove("hidden");

userInfo.innerText="Welcome "+res.user.email;

userStatus.innerHTML=`<div class="status success">Login Success</div>`

})

.catch(err=>{

userStatus.innerHTML=`<div class="status error">${err.message}</div>`

})

}


/* CREATE USER */

createBtn.onclick=()=>{

createUserWithEmailAndPassword(auth,newEmail.value,newPass.value)

.then(res=>{

const uid=res.user.uid

update(ref(db,"users/"+uid),{

username:newEmail.value,
status:"active"

})

createStatus.innerHTML=`<div class="status success">User Created</div>`

})

.catch(err=>{

createStatus.innerHTML=`<div class="status error">${err.message}</div>`

})

}


/* USER LIST */

onValue(ref(db,"users"),snapshot=>{

userList.innerHTML=""

snapshot.forEach(child=>{

let data=child.val()
let uid=child.key

userList.innerHTML+=`

<div class="userBox">

<b>${data.username}</b>
<br>Status : ${data.status}

<br><br>

<button onclick="banUser('${uid}')">BAN</button>
<button onclick="unbanUser('${uid}')">UNBAN</button>

</div>

`

})

})


/* BAN */

window.banUser=function(uid){

update(ref(db,"users/"+uid),{

status:"banned"

})

alert("User di BAN")

}


/* UNBAN */

window.unbanUser=function(uid){

update(ref(db,"users/"+uid),{

status:"active"

})

alert("User diaktifkan")

}


/* LOGOUT */

logoutUser.onclick=()=>signOut(auth).then(()=>location.reload())
logoutAdmin.onclick=()=>signOut(auth).then(()=>location.reload())


onAuthStateChanged(auth,user=>{

if(user){

adminInfo.innerHTML=`<div class="status success">Login : ${user.email}</div>`

}

})
// ================= STATUS USER =================

// tampilkan status saat login
onAuthStateChanged(auth, user=>{
  if(user){

    const userRef = ref(db, "users/" + user.uid);

    onValue(userRef, snap=>{
      const data = snap.val();

      if(data){

        let status = data.status || "FREE";
        let expired = data.expired || 0;

        // cek expired
        if(expired && Date.now() > expired){
          status = "FREE";

          update(userRef,{
            status:"FREE"
          });
        }

        userInfo.innerHTML = `
        Welcome ${user.email}<br>
        Status: <b>${status}</b>
        `;
      }
    });
  }
});
  window.upgradeVIP = function(){

  const user = auth.currentUser;

  if(!user){
    alert("Login dulu!");
    return;
  }

  const userRef = ref(db, "users/" + user.uid);

  update(userRef,{
    status:"VIP",
    expired: Date.now() + (30*24*60*60*1000)
  });

  alert("Berhasil upgrade ke VIP");
}

window.upgradePremium = function(){

  const user = auth.currentUser;

  if(!user){
    alert("Login dulu!");
    return;
  }

  const userRef = ref(db, "users/" + user.uid);

  update(userRef,{
    status:"PREMIUM",
    expired: Date.now() + (30*24*60*60*1000)
  });

  alert("Berhasil upgrade ke PREMIUM");
    }
</script>

</body>
</html>
