<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBro - Eclipse Admin Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #020617;
            --card: #0f172a;
            --primary: #3b82f6;
            --accent: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR */
        aside { 
            width: 280px; background: #000; border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 30px 20px;
        }
        .logo { font-size: 1.5rem; font-weight: 800; color: #fff; margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }
        .logo span { color: var(--primary); }
        
        .nav-item { 
            padding: 14px 18px; border-radius: 12px; color: var(--text-dim); 
            text-decoration: none; display: flex; align-items: center; gap: 12px;
            margin-bottom: 8px; transition: 0.3s; cursor: pointer;
        }
        .nav-item:hover, .nav-item.active { background: var(--card); color: #fff; }
        .nav-item.active { border-left: 4px solid var(--primary); }

        /* MAIN */
        main { flex: 1; overflow-y: auto; padding: 40px; position: relative; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        
        /* STATS */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { 
            background: var(--card); padding: 25px; border-radius: 24px; 
            border: 1px solid var(--border); transition: 0.3s;
        }
        .stat-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .stat-card p { font-size: 0.75rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        .stat-card h2 { font-size: 2rem; margin-top: 10px; }

        /* SEARCH BAR */
        .search-container { position: relative; width: 350px; }
        .search-container input {
            width: 100%; background: var(--card); border: 1px solid var(--border);
            padding: 12px 15px 12px 45px; border-radius: 12px; color: #fff; outline: none;
        }
        .search-container i { position: absolute; left: 15px; top: 14px; color: var(--text-dim); }

        /* USER GRID */
        .user-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 25px; }
        .user-card { 
            background: var(--card); border-radius: 28px; padding: 25px; 
            border: 1px solid var(--border); position: relative; transition: 0.3s;
        }
        .user-card:hover { border-color: rgba(255,255,255,0.2); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        
        /* Profil Styling */
        .u-top { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .u-avatar { width: 60px; height: 60px; border-radius: 18px; object-fit: cover; background: #1e293b; }
        .u-name-box h4 { font-size: 1.1rem; display: flex; align-items: center; gap: 6px; }
        .verified-icon { color: var(--primary); font-size: 0.95rem; }
        .u-id { font-size: 0.7rem; color: var(--text-dim); background: rgba(255,255,255,0.05); padding: 2px 8px; border-radius: 6px; }

        .u-bio { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 20px; line-height: 1.5; min-height: 40px; }

        /* Appeal/Banding Info */
        .appeal-notice {
            background: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.2);
            padding: 15px; border-radius: 15px; margin-bottom: 20px; font-size: 0.8rem;
        }
        .appeal-notice b { color: var(--warning); display: block; margin-bottom: 5px; }

        /* Action Buttons */
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border-top: 1px solid var(--border); pt: 20px; padding-top: 15px; }
        .btn {
            padding: 10px; border-radius: 12px; border: none; font-size: 0.75rem; 
            font-weight: 700; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .btn-verify { background: rgba(59, 130, 246, 0.1); color: var(--primary); }
        .btn-verify.active { background: var(--primary); color: white; }
        .btn-ban { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
        .btn-ban.active { background: var(--warning); color: white; }
        .btn-del { background: rgba(239, 68, 68, 0.1); color: var(--danger); grid-column: span 2; }
        .btn-del:hover { background: var(--danger); color: white; }

        /* Status Badge */
        .status-badge {
            position: absolute; top: 20px; right: 20px; font-size: 0.65rem;
            padding: 4px 10px; border-radius: 20px; font-weight: 800;
        }
        .badge-banned { background: var(--danger); color: white; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: var(--card); border-radius: 10px; }
    </style>
</head>
<body>

    <aside>
        <div class="logo"><i class="fas fa-bolt"></i> My<span>Bro</span></div>
        <div class="nav-item active"><i class="fas fa-th-large"></i> Dashboard</div>
        <div class="nav-item"><i class="fas fa-users"></i> Manajemen User</div>
        <div class="nav-item"><i class="fas fa-shield-check"></i> Laporan Banding</div>
        <div class="nav-item" onclick="location.reload()"><i class="fas fa-sync-alt"></i> Refresh Data</div>
        <div style="margin-top: auto;">
            <div class="nav-item" style="color: var(--danger);"><i class="fas fa-sign-out-alt"></i> Logout Admin</div>
        </div>
    </aside>

    <main>
        <div class="header-row">
            <div>
                <h1 style="font-weight: 800;">Eclipse Dashboard</h1>
                <p style="color: var(--text-dim); font-size: 0.9rem;">Selamat datang, Panglima MyBro. Kendalikan sistem Anda.</p>
            </div>
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInp" placeholder="Cari Nama atau ID User..." oninput="filterUser()">
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><p>Total Warga</p><h2 id="count-total">0</h2></div>
            <div class="stat-card"><p>Centang Biru</p><h2 id="count-verified" style="color: var(--primary);">0</h2></div>
            <div class="stat-card"><p>Akun Terblokir</p><h2 id="count-banned" style="color: var(--warning);">0</h2></div>
            <div class="stat-card"><p>Uptime Server</p><h2 style="color: var(--accent);">99.9%</h2></div>
        </div>

        <div class="user-grid" id="userContainer">
            </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCHr0eemIkfHNFDUkSaFDklp_c1OgmSnl8",
            authDomain: "mybro-9ba5f.firebaseapp.com",
            databaseURL: "https://mybro-9ba5f-default-rtdb.firebaseio.com/",
            projectId: "mybro-9ba5f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'users'), (snap) => {
            const container = document.getElementById('userContainer');
            container.innerHTML = "";
            if(!snap.exists()) return;

            const users = snap.val();
            const keys = Object.keys(users);
            
            // Statistik
            let total = 0, banned = 0, verified = 0;

            keys.forEach(uid => {
                const u = users[uid];
                const prof = u.profile || { name: "Tanpa Nama", bio: "-", pfp: "" };
                const isBanned = u.isBanned || false;
                const isVerified = u.isVerified || false;
                const appeal = u.appealMessage || "";

                total++;
                if(isBanned) banned++;
                if(isVerified) verified++;

                const defaultAvatar = `https://ui-avatars.com/api/?name=${prof.name}&background=1e293b&color=fff&bold=true`;
                
                const card = document.createElement('div');
                card.className = 'user-card';
                card.dataset.search = (prof.name + uid).toLowerCase();

                card.innerHTML = `
                    ${isBanned ? '<span class="status-badge badge-banned">BANNED</span>' : ''}
                    <div class="u-top">
                        <img src="${prof.pfp || defaultAvatar}" class="u-avatar">
                        <div class="u-name-box">
                            <h4>${prof.name} ${isVerified ? '<i class="fas fa-check-circle verified-icon"></i>' : ''}</h4>
                            <span class="u-id">UID: ${uid}</span>
                        </div>
                    </div>
                    
                    <div class="u-bio">${prof.bio}</div>

                    ${(isBanned && appeal) ? `
                        <div class="appeal-notice">
                            <b>📩 PESAN BANDING:</b>
                            "${appeal}"
                        </div>
                    ` : ''}

                    <div class="actions">
                        <button class="btn btn-verify ${isVerified ? 'active' : ''}" onclick="window.adminToggle('isVerified', '${uid}', ${isVerified})">
                            <i class="fas fa-certificate"></i> ${isVerified ? 'Verified' : 'Verify'}
                        </button>
                        <button class="btn btn-ban ${isBanned ? 'active' : ''}" onclick="window.adminToggle('isBanned', '${uid}', ${isBanned})">
                            <i class="fas fa-ban"></i> ${isBanned ? 'Unban' : 'Ban Akun'}
                        </button>
                        <button class="btn btn-del" onclick="window.adminDelete('${uid}')">
                            <i class="fas fa-trash-alt"></i> Hapus Permanen
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });

            document.getElementById('count-total').innerText = total;
            document.getElementById('count-banned').innerText = banned;
            document.getElementById('count-verified').innerText = verified;
        });

        // ACTIONS GLOBAL
        window.adminToggle = (field, uid, currentStatus) => {
            const updates = {};
            updates[field] = !currentStatus;
            
            // Jika unban, sekalian hapus pesan bandingnya
            if(field === 'isBanned' && currentStatus === true) {
                updates['appealMessage'] = null;
            }

            update(ref(db, `users/${uid}`), updates).then(() => {
                console.log("Updated success");
            });
        };

        window.adminDelete = (uid) => {
            if(confirm("PERINGATAN: Menghapus user akan menghilangkan semua chat dan data permanen. Lanjutkan?")) {
                set(ref(db, `users/${uid}`), null);
            }
        };

        window.filterUser = () => {
            const q = document.getElementById('searchInp').value.toLowerCase();
            document.querySelectorAll('.user-card').forEach(c => {
                c.style.display = c.dataset.search.includes(q) ? 'block' : 'none';
            });
        };
    </script>
</body>
</html>
