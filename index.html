<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Elite Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-900 text-white p-10 font-sans">

    <div class="max-w-2xl mx-auto bg-gray-800 rounded-[3rem] p-10 border border-gray-700 shadow-2xl text-center">
        <h1 class="text-3xl font-black text-yellow-500 mb-8 uppercase tracking-widest">Control Payouts</h1>
        
        <div class="space-y-6">
            <button onclick="sendResult('A')" class="w-full bg-blue-600 hover:bg-blue-500 p-6 rounded-3xl text-xl font-black transition transform active:scale-95 shadow-xl shadow-blue-900/40">
                SET PEMENANG: SATRIA BIRU (A)
            </button>

            <button onclick="sendResult('B')" class="w-full bg-red-600 hover:bg-red-500 p-6 rounded-3xl text-xl font-black transition transform active:scale-95 shadow-xl shadow-red-900/40">
                SET PEMENANG: NAGA MERAH (B)
            </button>
        </div>

        <div class="mt-12 text-gray-500 text-sm italic">
            *Sinyal akan dikirim otomatis ke semua tab User yang terbuka.
        </div>
    </div>

    <script>
        const channel = new BroadcastChannel('laga_system');

        function sendResult(winner) {
            Swal.fire({
                title: 'Konfirmasi Hasil',
                text: `Menangkan Player ${winner} dan kirim saldo x2 ke user?`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#10b981'
            }).then((result) => {
                if (result.isConfirmed) {
                    // MENGIRIM SINYAL KE USER
                    channel.postMessage({ type: 'RESULT', winner: winner });
                    Swal.fire('Terkirim!', 'Pop-up otomatis muncul di layar user.', 'success');
                }
            });
        }
    </script>
</body>
</html>
