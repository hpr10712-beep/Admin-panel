<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>ADMIN PANEL | GOD MODE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: #020617; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .admin-card { background: #0f172a; border: 2px solid #1e293b; padding: 50px; border-radius: 4rem; text-align: center; width: 600px; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <div class="admin-card">
        <h1 class="text-4xl font-black text-yellow-500 mb-2 italic">COMMAND CENTER</h1>
        <p class="text-slate-500 mb-12 uppercase tracking-widest text-xs">Otoritas Payout Real-time</p>
        
        <div class="space-y-6">
            <button onclick="win('A')" class="w-full bg-blue-600 hover:bg-blue-500 py-8 rounded-[2rem] text-2xl font-black transition-all active:scale-95 shadow-lg shadow-blue-900/40 uppercase">Menangkan SATRIA BIRU (A)</button>
            <button onclick="win('B')" class="w-full bg-red-600 hover:bg-red-500 py-8 rounded-[2rem] text-2xl font-black transition-all active:scale-95 shadow-lg shadow-red-900/40 uppercase">Menangkan NAGA MERAH (B)</button>
        </div>

        <button onclick="localStorage.setItem('mega_balance', 10000000); location.reload();" class="mt-12 text-slate-600 hover:text-slate-400 text-xs uppercase tracking-widest underline">Reset Saldo Global</button>
    </div>

    <script>
        const bc = new BroadcastChannel('laga_premium');
        function win(p) {
            Swal.fire({
                title: 'UMUMKAN HASIL?',
                text: `Kirim kemenangan untuk Player ${p} sekarang!`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#eab308',
                background: '#0f172a', color: '#fff'
            }).then((result) => {
                if (result.isConfirmed) {
                    bc.postMessage({ type: 'RESULT', winner: p });
                    Swal.fire('TERKIRIM', 'Pop-up otomatis muncul di layar user!', 'success');
                }
            });
        }
    </script>
</body>
</html>
