<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>MyBro - Master Admin Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #2563eb;
            --sidebar-bg: #0f172a;
            --main-bg: #f8fafc;
            --white: #ffffff;
            --border: #e2e8f0;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; }
        
        /* Force Desktop View */
        body { 
            background: var(--main-bg); 
            color: var(--text-main); 
            min-width: 1280px; 
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* SIDEBAR */
        aside { 
            width: 260px; min-width: 260px;
            background: var(--sidebar-bg); 
            display: flex; flex-direction: column;
        }
        .brand {
            padding: 30px 25px; display: flex; align-items: center; gap: 12px;
            color: white; font-size: 1.2rem; font-weight: 800; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .nav-list { padding: 20px 15px; flex: 1; }
        .nav-link {
            padding: 12px 15px; border-radius: 8px; color: #94a3b8;
            display: flex; align-items: center; gap: 12px; text-decoration: none;
            margin-bottom: 5px; transition: 0.2s; cursor: pointer; font-size: 0.9rem;
        }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.05); color: white; }
        .nav-link.active { background: var(--primary); }

        /* MAIN CONTENT */
        main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        
        .top-bar {
            background: var(--white); padding: 15px 40px;
            border-bottom: 1px solid var(--border); display: flex;
            justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 10;
        }
        .search-box {
            position: relative; width: 400px;
        }
        .search-box input {
            width: 100%; padding: 10px 15px 10px 40px; border-radius: 10px;
            border: 1px solid var(--border); background: #f1f5f9; outline: none;
        }
        .search-box i { position: absolute; left: 15px; top: 12px; color: var(--text-muted); }

        .container { padding: 40px; }

        /* STATS */
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: white; padding: 20px; border-radius: 15px; border: 1px solid var(--border); }
        .stat-card p { font-size: 0.8rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; }
        .stat-card h2 { font-size: 1.8rem; color: var(--text-main); }

        /* USER CARDS */
        .user-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .user-card { 
            background: white; border: 1px solid var(--border); border-radius: 16px; 
            padding: 20px; transition: 0.3s; position: relative;
        }
        .user-card.is-banned { border-left: 5px solid var(--warning); background: #fffcf9; }
        .user-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }

        .u-info { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .u-pfp { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; }
        .u-name h4 { font-size: 1rem; color: var(--text-main); }
        .u-id { font-size: 0.7rem; color: var(--primary); font-weight: 700; }

        .u-bio { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 15px; min-height: 38px; }

        /* APPEAL SECTION (KOLOM BANDING) */
        .appeal-box {
            background: #fef3c7; border: 1px solid #fde68a; border-radius: 10px;
            padding: 12px; margin-bottom: 15px; font-size: 0.8rem; color: #92400e;
        }
        .appeal-box b { display: block; margin-bottom: 3px; font-weight: 800; }

        .u-actions { 
            display: flex; gap: 10px; padding-top: 15px; border-top: 1px solid var(--border);
        }
        .btn { 
            flex: 1; padding: 8px; border-radius: 8px; border: 1px solid var(--border);
            font-size: 0.75rem; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .btn-ban { background: #fff7ed; color: #f97316; }
        .btn-ban:hover { background: #f97316; color: white; }
        .btn-unban { background: var(--success); color: white; border: none; }
        .btn-del { background: #fff1f2; color: var(--danger); }
        .btn-del:hover { background: var(--danger); color: white; }

        /* NOTIF LOG */
        #log-area { margin-top: 20px; font-size: 0.8rem; color: var(--text-muted); }
    </style>
</head>
<body>

    <aside>
        <div class="brand"><i class="fas fa-shield-halved"></i> MYBRO ADMIN</div>
        <div class="nav-list">
            <div class="nav-link active"><i class="fas fa-table-columns"></i> Dashboard</div>
            <div class="nav-link" onclick="location.reload()"><i class="fas fa-sync"></i> Muat Ulang Data</div>
            <div class="nav-link"><i class="fas fa-user-shield"></i> Laporan Banding</div>
            <div class="nav-link"><i class="fas fa-gear"></i> Pengaturan Sistem</div>
        </div>
        <div style="padding: 20px; border-top: 1px solid rgba(255,255,255,0.05);">
            <div class="nav-link" style="color: var(--danger);"><i class="fas fa-power-off"></i> Keluar</div>
        </div>
    </aside>

    <main>
        <div class="top-bar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="search" placeholder="Cari User atau ID..." oninput="filter()">
            </div>
            <div style="display: flex; align-items: center; gap: 12px;">
                <div style="text-align: right;">
                    <p style="font-size: 0.8rem; font-weight: 800;">Master Admin</p>
                    <p style="font-size: 0.7rem; color: var(--success);">Server Online</p>
                </div>
                <img src="https://ui-avatars.com/api/?name=Admin&background=0f172a&color=fff" style="width: 35px; height: 35px; border-radius: 50%;">
            </div>
        </div>

        <div class="container">
            <div class="stats-row">
                <div class="stat-card"><p>Total User</p><h2 id="s-users">0</h2></div>
                <div class="stat-card"><p>Terblokir</p><h2 id="s-banned" style="color: var(--warning);">0</h2></div>
                <div class="stat-card"><p>Total Chat</p><h2 id="s-chats">0</h2></div>
                <div class="stat-card"><p>Status Server</p><h2 style="color: var(--success);">Aktif</h2></div>
            </div>

            <h3 style="margin-bottom: 20px;">Eksplorasi Database</h3>
            <div class="user-grid" id="grid">
                </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Konfigurasi Database Anda
        const firebaseConfig = {
            apiKey: "AIzaSyCHr0eemIkfHNFDUkSaFDklp_c1OgmSnl8",
            authDomain: "mybro-9ba5f.firebaseapp.com",
            databaseURL: "https://mybro-9ba5f-default-rtdb.firebaseio.com/",
            projectId: "mybro-9ba5f"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // REAL-TIME SYNC
        onValue(ref(db, 'users'), (snap) => {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            if(!snap.exists()) return;

            const data = snap.val();
            const keys = Object.keys(data);
            let banCount = 0;

            document.getElementById('s-users').innerText = keys.length;

            keys.forEach(uid => {
                const user = data[uid];
                const isBanned = user.isBanned || false;
                if(isBanned) banCount++;

                const p = user.profile || { name: 'User '+uid, bio: 'No bio.', pfp: '' };
                const pfp = p.pfp || `https://ui-avatars.com/api/?name=${p.name}&background=f1f5f9&color=2563eb&bold=true`;
                
                // Cek apakah ada pesan banding dari user
                const appealMsg = user.appealMessage || "";

                const card = document.createElement('div');
                card.className = `user-card ${isBanned ? 'is-banned' : ''}`;
                card.dataset.search = (p.name + uid).toLowerCase();
                
                card.innerHTML = `
                    <div class="u-info">
                        <img src="${pfp}" class="u-pfp">
                        <div class="u-name">
                            <h4>${p.name} ${isBanned ? '🚫' : ''}</h4>
                            <p class="u-id">UID: ${uid}</p>
                        </div>
                    </div>
                    <div class="u-bio">${p.bio}</div>
                    
                    ${(isBanned && appealMsg) ? `
                        <div class="appeal-box">
                            <b>📩 Pesan Banding:</b>
                            "${appealMsg}"
                        </div>
                    ` : ''}

                    <div class="u-actions">
                        ${isBanned ? 
                            `<button class="btn btn-unban" onclick="toggleBan('${uid}', true)">Buka Blokir</button>` : 
                            `<button class="btn btn-ban" onclick="toggleBan('${uid}', false)">Ban Sementara</button>`
                        }
                        <button class="btn btn-del" onclick="hapus('${uid}', '${p.name}')">Hapus</button>
                    </div>
                `;
                grid.appendChild(card);
            });
            document.getElementById('s-banned').innerText = banCount;
        });

        // SYNC LAINNYA
        onValue(ref(db, 'chats'), s => document.getElementById('s-chats').innerText = s.exists() ? Object.keys(s.val()).length : 0);

        // FUNGSI AKSI
        window.toggleBan = (uid, currentBanned) => {
            const msg = currentBanned ? "Aktifkan kembali akun ini?" : "Nonaktifkan akun ini?";
            if(confirm(msg)) {
                // Saat unban, kita hapus juga pesan bandingnya agar bersih
                update(ref(db, `users/${uid}`), {
                    isBanned: !currentBanned,
                    appealMessage: null 
                });
            }
        };

        window.hapus = (uid, name) => {
            if(confirm(`Hapus permanen ${name}? Semua data akan hilang.`)) {
                set(ref(db, `users/${uid}`), null);
            }
        };

        window.filter = () => {
            const q = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.user-card').forEach(c => {
                c.style.display = c.dataset.search.includes(q) ? "block" : "none";
            });
        };
    </script>

    </body>
</html>
