<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radz Store Elite Panel</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

:root{
--accent-primary: linear-gradient(135deg,#ff6b6b,#4ecdc4);
}

body{
margin:0;
font-family:'Orbitron',monospace;
background:#000;
color:#fff;
overflow-x:hidden;
}

/* GRID */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background-image:
linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
background-size:40px 40px;
z-index:-1;
}

/* CONTAINER */
.container{
max-width:1000px;
margin:auto;
padding:40px;
}

.header{
text-align:center;
margin-bottom:30px;
}

.header h1{
font-size:45px;
background:var(--accent-primary);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* TAB */
.tab-container{
display:flex;
gap:10px;
margin-bottom:20px;
}

.tab-btn{
flex:1;
padding:12px;
border:none;
border-radius:10px;
background:#111;
color:#aaa;
cursor:pointer;
}

.tab-btn.active{
background:var(--accent-primary);
color:black;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

/* INPUT */
input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:none;
background:#111;
color:white;
}

/* BUTTON */
button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:var(--accent-primary);
cursor:pointer;
margin-top:10px;
}

.status{
margin-top:10px;
padding:10px;
border-radius:10px;
}

.success{background:green;}
.error{background:red;}

.hidden{display:none}

/* USER LIST */
.userBox{
background:#111;
padding:10px;
margin-top:10px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
}

.userBox button{
width:auto;
padding:6px 10px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>RADZ STORE</h1>
</div>

<div class="tab-container">
<button class="tab-btn active" id="btnUser">USER</button>
<button class="tab-btn" id="btnAdmin">ADMIN</button>
</div>

<div id="userList"></div>

<!-- USER -->
<div id="userTab">
<div class="card">
<h2>Login User</h2>

<input id="userEmail" placeholder="Email">
<input id="userPassword" type="password" placeholder="Password">

<button id="loginBtn">LOGIN</button>

<div id="userStatus"></div>
</div>

<div id="userDashboard" class="hidden card">
<h3 id="userInfo"></h3>
<button id="logoutUser">LOGOUT</button>
</div>
</div>

<!-- ADMIN -->
<div id="adminTab" class="hidden">

<div class="card">

<h2>Admin Panel</h2>

<div id="adminInfo"></div>

<input id="newEmail" placeholder="Email user">
<input id="newPass" type="password" placeholder="Password">

<button id="createBtn">CREATE USER</button>

<div id="createStatus"></div>

<button id="logoutAdmin">LOGOUT</button>

</div>

</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
createUserWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getDatabase,
ref,
onValue,
update
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";


const firebaseConfig = {
apiKey: "AIzaSyAgGd8-u_E_JKKs0Zf7rXZ6O4ADw85CUAU",
authDomain: "radzpanel-3a8a3.firebaseapp.com",
projectId: "radzpanel-3a8a3",
storageBucket: "radzpanel-3a8a3.firebasestorage.app",
messagingSenderId: "20608954308",
appId: "1:20608954308:web:0e09ba796c9086813fbe91"
};


const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);


/* ELEMENT */

const userTab = document.getElementById("userTab");
const adminTab = document.getElementById("adminTab");

const btnUser = document.getElementById("btnUser");
const btnAdmin = document.getElementById("btnAdmin");

const loginBtn = document.getElementById("loginBtn");
const userEmail = document.getElementById("userEmail");
const userPassword = document.getElementById("userPassword");

const userStatus = document.getElementById("userStatus");
const userDashboard = document.getElementById("userDashboard");
const userInfo = document.getElementById("userInfo");

const createBtn = document.getElementById("createBtn");
const newEmail = document.getElementById("newEmail");
const newPass = document.getElementById("newPass");
const createStatus = document.getElementById("createStatus");

const logoutUser = document.getElementById("logoutUser");
const logoutAdmin = document.getElementById("logoutAdmin");

const adminInfo = document.getElementById("adminInfo");
const userList = document.getElementById("userList");


/* TAB */

btnUser.onclick = () => {

userTab.classList.remove("hidden");
adminTab.classList.add("hidden");

btnUser.classList.add("active");
btnAdmin.classList.remove("active");

};


btnAdmin.onclick = () => {

adminTab.classList.remove("hidden");
userTab.classList.add("hidden");

btnAdmin.classList.add("active");
btnUser.classList.remove("active");

};


/* LOGIN USER */

loginBtn.onclick = () => {

signInWithEmailAndPassword(auth,userEmail.value,userPassword.value)

.then(res=>{

userDashboard.classList.remove("hidden");

userInfo.innerText = "Welcome " + res.user.email;

userStatus.innerHTML =
`<div class="status success">Login Success</div>`;

})

.catch(err=>{

userStatus.innerHTML =
`<div class="status error">${err.message}</div>`;

});

};


/* CREATE USER */

createBtn.onclick = () => {

createUserWithEmailAndPassword(auth,newEmail.value,newPass.value)

.then(()=>{

createStatus.innerHTML =
`<div class="status success">User Created</div>`;

})

.catch(err=>{

createStatus.innerHTML =
`<div class="status error">${err.message}</div>`;

});

};


/* LOGOUT */

logoutUser.onclick = ()=> signOut(auth).then(()=>location.reload());

logoutAdmin.onclick = ()=> signOut(auth).then(()=>location.reload());


/* AUTO LOGIN */

onAuthStateChanged(auth,user=>{

if(user){

adminInfo.innerHTML =
`<div class="status success">Login: ${user.email}</div>`;

}

});


/* USER LIST */

onValue(ref(db,"users"),(snapshot)=>{

userList.innerHTML = "";

snapshot.forEach(child=>{

let data = child.val();
let uid = child.key;

userList.innerHTML += `
<div class="card">
<b>${data.username || "user"}</b> - ${data.status || "active"}
<br>
<button onclick="banUser('${uid}')">BAN</button>
<button onclick="unbanUser('${uid}')">UNBAN</button>
</div>
`;

});

});


/* BAN USER */

window.banUser = function(uid){

if(confirm("Yakin ingin BAN user ini?")){

update(ref(db,"users/"+uid),{

status:"banned"

});

alert("User berhasil di BAN");

}

}


/* UNBAN USER */

window.unbanUser = function(uid){

if(confirm("Aktifkan kembali user ini?")){

update(ref(db,"users/"+uid),{

status:"active"

});

alert("User berhasil diaktifkan");

}

}

</script>
</script>

</body>
</html>
