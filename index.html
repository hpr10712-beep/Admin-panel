<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200">
    <title>ADMIN | GOD MODE CONTROL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: white; width: 1200px; margin: 0 auto; padding: 40px; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #eab308; border-radius: 10px; }
    </style>
</head>
<body>

    <nav class="flex justify-between items-center mb-10 glass p-8 rounded-[2.5rem] border-t-4 border-yellow-500 shadow-2xl">
        <div class="flex items-center gap-4">
            <div class="h-12 w-12 bg-yellow-500 rounded-xl flex items-center justify-center font-black text-black text-xl font-orbitron">A</div>
            <h1 class="font-orbitron text-3xl font-black text-white italic">CONTROL CENTER</h1>
        </div>
        <div class="glass px-8 py-3 rounded-2xl text-right border-r-4 border-yellow-500">
            <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Global Balance</p>
            <p id="globalBal" class="text-xl font-orbitron font-bold text-yellow-500">Rp 0</p>
        </div>
    </nav>

    <div class="glass p-8 rounded-[2.5rem] mb-10 border-l-4 border-green-500">
        <h3 class="font-orbitron font-bold text-sm mb-4 text-green-400">MANUAL TOP UP (INPUT ID)</h3>
        <div class="flex gap-4">
            <input type="text" id="manualId" class="flex-1 bg-slate-950 border border-slate-800 p-4 rounded-xl font-orbitron font-bold text-yellow-500 outline-none focus:border-green-500" placeholder="MASUKKAN ID (CONTOH: PLAYER-1234)">
            <input type="number" id="manualAmount" class="w-64 bg-slate-950 border border-slate-800 p-4 rounded-xl font-orbitron font-bold text-white outline-none focus:border-green-500" placeholder="NOMINAL RP">
            <button onclick="manualTopUp()" class="bg-green-600 hover:bg-green-500 px-10 rounded-xl font-orbitron font-black text-white transition-all active:scale-95 shadow-lg shadow-green-900/40">PROSES TOP UP</button>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-8 mb-10 text-center">
        <button onclick="setWinner('A')" class="bg-blue-600 hover:bg-blue-500 p-8 rounded-[2rem] font-orbitron font-black text-2xl transition-all active:scale-95 shadow-xl shadow-blue-900/30">SET WINNER A</button>
        <button onclick="setWinner('B')" class="bg-red-600 hover:bg-red-500 p-8 rounded-[2rem] font-orbitron font-black text-2xl transition-all active:scale-95 shadow-xl shadow-red-900/30">SET WINNER B</button>
    </div>

    <div class="grid grid-cols-3 gap-8">
        <div class="col-span-1 glass p-8 rounded-[3rem] h-[500px] flex flex-col">
            <h3 class="font-orbitron font-bold text-yellow-500 mb-6 uppercase tracking-widest text-xs">Daftar Player Online</h3>
            <div id="uList" class="space-y-4 overflow-y-auto pr-2">
                </div>
        </div>

        <div class="col-span-2 glass p-8 rounded-[3rem] h-[500px] flex flex-col">
            <h3 class="font-orbitron font-bold text-slate-400 mb-6 uppercase tracking-widest text-xs italic">Riwayat Transaksi Global</h3>
            <div class="overflow-y-auto pr-2 h-full rounded-2xl border border-white/5 bg-slate-950/40">
                <table class="w-full text-left text-[11px] font-mono">
                    <thead class="sticky top-0 bg-slate-900 text-slate-500 uppercase">
                        <tr><th class="p-4">Time</th><th class="p-4">ID</th><th class="p-4">Action</th><th class="p-4">Amount</th></tr>
                    </thead>
                    <tbody id="globalLogs" class="divide-y divide-white/5"></tbody>
                </table>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, set, update, push, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // PERBAIKAN: Tanda kutip diperbaiki, garis miring di akhir URL dihapus
    const firebaseConfig = { 
        apiKey: "AIzaSyCHr0eemIkfHNFDUkSaFDklp_c1OgmSnl8", 
        databaseURL: "https://mybro-9ba5f-default-rtdb.firebaseio.com",
        projectId: "mybro-9ba5f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- FUNGSI TOP UP MANUAL ---
    window.manualTopUp = async () => {
        const idInput = document.getElementById('manualId');
        const amtInput = document.getElementById('manualAmount');
        const id = idInput.value.toUpperCase().trim();
        const amount = parseInt(amtInput.value);

        if(!id || !amount) return Swal.fire('Error', 'ID dan Nominal harus diisi!', 'error');

        const userRef = ref(db, 'users/' + id);
        try {
            const snapshot = await get(userRef);
            if (snapshot.exists()) {
                const currentBal = snapshot.val().balance || 0;
                const newBal = currentBal + amount;
                
                await update(userRef, { balance: newBal });
                
                // Tambahkan ke Log Riwayat
                const time = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
                push(ref(db, 'globalLogs'), {
                    time: time, user: id, desc: 'Top Up Admin', amount: amount, type: 'win'
                });

                Swal.fire('Sukses', `Berhasil Top Up Rp ${amount.toLocaleString()} ke ${id}`, 'success');
                idInput.value = "";
                amtInput.value = "";
            } else {
                Swal.fire('Gagal', 'ID Player tidak ditemukan!', 'error');
            }
        } catch (e) {
            Swal.fire('Error', 'Gagal akses database. Cek koneksi/rules!', 'error');
        }
    };

    // --- SINKRONISASI DAFTAR PLAYER ---
    onValue(ref(db, 'users'), (snap) => {
        const users = snap.val();
        const container = document.getElementById('uList');
        let totalB = 0;
        container.innerHTML = "";
        
        if(users) {
            for(let id in users) {
                const bal = users[id].balance || 0;
                totalB += bal;
                container.innerHTML += `
                    <div class="bg-slate-900/80 p-4 rounded-xl border border-white/5 flex justify-between items-center mb-2">
                        <div>
                            <p class="font-bold text-white uppercase text-[10px] tracking-widest">${id}</p>
                            <p class="text-yellow-500 font-bold font-orbitron text-xs">Rp ${bal.toLocaleString('id-ID')}</p>
                        </div>
                        <button onclick="fillID('${id}')" class="bg-blue-600 text-[9px] px-3 py-1 rounded-lg font-bold uppercase hover:bg-blue-500 transition">PILIH</button>
                    </div>
                `;
            }
        }
        document.getElementById('globalBal').innerText = "Rp " + totalB.toLocaleString('id-ID');
    });

    window.fillID = (id) => {
        document.getElementById('manualId').value = id;
        document.getElementById('manualAmount').focus();
    };

    // --- SINKRONISASI LOG TRANSAKSI ---
    onValue(ref(db, 'globalLogs'), (snap) => {
        const logs = snap.val();
        const container = document.getElementById('globalLogs');
        container.innerHTML = "";
        if(logs) {
            Object.values(logs).reverse().forEach(l => {
                container.innerHTML += `
                    <tr class="hover:bg-white/5 transition border-b border-white/5">
                        <td class="p-4 text-slate-500">${l.time}</td>
                        <td class="p-4 font-bold text-blue-400 uppercase">${l.user}</td>
                        <td class="p-4 italic text-slate-300 text-[10px]">${l.desc}</td>
                        <td class="p-4 text-yellow-500 font-bold">Rp ${l.amount.toLocaleString()}</td>
                    </tr>
                `;
            });
        }
    });

    // --- TENTUKAN PEMENANG ---
    window.setWinner = (side) => {
        Swal.fire({
            title: 'Tentukan Pemenang?',
            text: "Player " + side + " akan menang!",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'YA, BERIKAN HADIAH'
        }).then((result) => {
            if (result.isConfirmed) {
                set(ref(db, 'match/result'), null).then(() => {
                    set(ref(db, 'match/result'), side);
                    Swal.fire('Match Selesai', `Player ${side} menang!`, 'success');
                });
            }
        });
    };
</script>

</body>
</html>
