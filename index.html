<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyBro Admin - Eclipse X</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #020617;
            --panel: rgba(15, 23, 42, 0.7);
            --primary: #3b82f6;
            --accent: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: var(--text); 
            margin: 0; padding: 0; min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #020617 100%);
        }

        /* HEADER & NAVIGATION */
        header {
            padding: 20px; background: rgba(0,0,0,0.3); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border); sticky; top: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-size: 1.3rem; font-weight: 800; letter-spacing: -1px; }
        .logo span { color: var(--primary); }

        /* MAIN CONTENT */
        main { padding: 20px; max-width: 1200px; margin: 0 auto; }

        /* STATS (Horizontal Scroll on Mobile) */
        .stats-row { 
            display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px;
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .stats-row::-webkit-scrollbar { display: none; }
        
        .stat-card {
            min-width: 160px; flex: 1; background: var(--panel); 
            padding: 20px; border-radius: 24px; border: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }
        .stat-card p { font-size: 0.7rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; margin: 0; }
        .stat-card h2 { font-size: 1.5rem; margin: 8px 0 0; }

        /* SEARCH BAR */
        .search-box {
            position: relative; margin: 20px 0;
        }
        .search-box input {
            width: 100%; background: var(--panel); border: 1px solid var(--border);
            padding: 15px 15px 15px 45px; border-radius: 16px; color: #fff; outline: none;
            font-size: 1rem; transition: 0.3s;
        }
        .search-box input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(59,130,246,0.2); }
        .search-box i { position: absolute; left: 18px; top: 18px; color: var(--text-dim); }

        /* USER LIST (Responsive Grid) */
        .user-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(100%, 1fr)); gap: 15px;
        }
        @media (min-width: 768px) { .user-grid { grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); } }

        .user-card {
            background: var(--panel); border-radius: 28px; padding: 20px;
            border: 1px solid var(--border); position: relative; overflow: hidden;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .user-card:active { transform: scale(0.98); }

        .u-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .u-pfp { width: 55px; height: 55px; border-radius: 18px; object-fit: cover; border: 1px solid var(--border); }
        .u-info h4 { margin: 0; font-size: 1rem; display: flex; align-items: center; gap: 5px; }
        
        /* Premium Verified Icon */
        .verified-glow { 
            color: #3b82f6; font-size: 0.9rem; 
            filter: drop-shadow(0 0 5px rgba(59, 130, 246, 0.6));
        }

        .u-id { font-size: 0.7rem; color: var(--text-dim); background: rgba(255,255,255,0.05); padding: 3px 8px; border-radius: 6px; }

        .u-bio { font-size: 0.85rem; color: var(--text-dim); line-height: 1.4; margin-bottom: 15px; }

        /* ACTIONS */
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn {
            padding: 12px; border-radius: 14px; border: none; font-size: 0.8rem;
            font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: 0.2s;
        }
        .btn-v { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
        .btn-v.active { background: #3b82f6; color: #fff; }
        .btn-b { background: rgba(245, 158, 11, 0.15); color: #fbbf24; }
        .btn-b.active { background: var(--warning); color: #fff; }
        .btn-d { background: rgba(239, 68, 68, 0.1); color: var(--danger); grid-column: span 2; margin-top: 5px; }

        /* APPEAL BADGE */
        .appeal-box {
            background: rgba(245, 158, 11, 0.1); border-left: 3px solid var(--warning);
            padding: 12px; border-radius: 10px; margin-bottom: 15px; font-size: 0.8rem; color: #fcd34d;
        }

        .status-pill {
            position: absolute; top: 15px; right: 15px; font-size: 0.6rem;
            padding: 4px 10px; border-radius: 20px; font-weight: 800; background: var(--danger);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><i class="fas fa-shield-halved"></i> My<span>Bro</span> Admin</div>
        <button onclick="location.reload()" style="background:none; border:none; color:white; font-size:1.2rem;"><i class="fas fa-rotate"></i></button>
    </header>

    <main>
        <div class="stats-row">
            <div class="stat-card"><p>Users</p><h2 id="s-total">0</h2></div>
            <div class="stat-card"><p>Verified</p><h2 id="s-verified" style="color:var(--primary)">0</h2></div>
            <div class="stat-card"><p>Banned</p><h2 id="s-banned" style="color:var(--warning)">0</h2></div>
        </div>

        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="search" placeholder="Cari Nama atau ID..." oninput="filter()">
        </div>

        <div class="user-grid" id="userContainer">
            </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCHr0eemIkfHNFDUkSaFDklp_c1OgmSnl8",
            authDomain: "mybro-9ba5f.firebaseapp.com",
            databaseURL: "https://mybro-9ba5f-default-rtdb.firebaseio.com/",
            projectId: "mybro-9ba5f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'users'), (snap) => {
            const container = document.getElementById('userContainer');
            container.innerHTML = "";
            if(!snap.exists()) return;

            const users = snap.val();
            let countTotal = 0, countBanned = 0, countVerified = 0;

            Object.keys(users).forEach(uid => {
                const u = users[uid];
                const p = u.profile || { name: "New User", bio: "-", pfp: "" };
                const isB = u.isBanned || false;
                const isV = u.isVerified || false;
                const appeal = u.appealMessage || "";

                countTotal++;
                if(isB) countBanned++;
                if(isV) countVerified++;

                const card = document.createElement('div');
                card.className = 'user-card';
                card.dataset.search = (p.name + uid).toLowerCase();
                
                card.innerHTML = `
                    ${isB ? '<div class="status-pill">TERBLOKIR</div>' : ''}
                    <div class="u-header">
                        <img src="${p.pfp || 'https://ui-avatars.com/api/?name='+p.name}" class="u-pfp">
                        <div class="u-info">
                            <h4>${p.name} ${isV ? '<i class="fas fa-check-circle verified-glow"></i>' : ''}</h4>
                            <span class="u-id">ID: ${uid}</span>
                        </div>
                    </div>
                    <div class="u-bio">${p.bio}</div>
                    
                    ${isB && appeal ? `<div class="appeal-box"><b>Pesan Banding:</b> "${appeal}"</div>` : ''}

                    <div class="actions">
                        <button class="btn btn-v ${isV ? 'active' : ''}" onclick="manage('${uid}', 'isVerified', ${isV})">
                            <i class="fas fa-certificate"></i> ${isV ? 'Verified' : 'Verify'}
                        </button>
                        <button class="btn btn-b ${isB ? 'active' : ''}" onclick="manage('${uid}', 'isBanned', ${isB})">
                            <i class="fas fa-user-slash"></i> ${isB ? 'Unban' : 'Ban'}
                        </button>
                        <button class="btn btn-d" onclick="del('${uid}')">
                            <i class="fas fa-trash-can"></i> Hapus Data
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });

            document.getElementById('s-total').innerText = countTotal;
            document.getElementById('s-verified').innerText = countVerified;
            document.getElementById('s-banned').innerText = countBanned;
        });

        window.manage = (uid, type, val) => {
            const data = {};
            data[type] = !val;
            if(type === 'isBanned' && val === true) data['appealMessage'] = null;
            update(ref(db, `users/${uid}`), data);
        };

        window.del = (uid) => {
            if(confirm("Hapus user " + uid + " secara permanen?")) {
                set(ref(db, `users/${uid}`), null);
            }
        };

        window.filter = () => {
            const q = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.user-card').forEach(c => {
                c.style.display = c.dataset.search.includes(q) ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
