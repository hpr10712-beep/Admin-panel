<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{background:#000;color:#fff;font-family:Orbitron}
.container{max-width:800px;margin:auto;padding:30px}
.card{background:#111;padding:20px;border-radius:15px;margin-top:20px}
input{width:100%;padding:12px;margin:10px 0;border-radius:10px;background:#222;color:#fff;border:none}
button{width:100%;padding:12px;border:none;border-radius:10px;background:linear-gradient(90deg,#ff6b6b,#4ecdc4);color:#000;font-weight:bold}
</style>
</head>

<body>
<div class="container">

<h1>ADMIN PANEL</h1>

<div class="card">
  <input id="email" placeholder="Email User">
  <input id="password" placeholder="Password">
  <input id="days" placeholder="Durasi (hari)">
  <select id="role">
    <option value="USER">USER</option>
    <option value="VIP">VIP</option>
  </select>

  <button onclick="createUser()">CREATE USER</button>
  <div id="status"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "radzpanel-3a8a3.firebaseapp.com",
  projectId: "radzpanel-3a8a3",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.createUser = async function(){
  const exp = new Date();
  exp.setDate(exp.getDate() + Number(days.value));

  await setDoc(doc(db,"users",email.value),{
    email: email.value,
    password: password.value,
    role: role.value,
    expired: exp.toISOString()
  });

  status.innerHTML="<p style='color:lime'>User dibuat!</p>";
};
</script>

</body>
</html>
